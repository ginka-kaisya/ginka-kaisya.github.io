<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Cafe | Responsive</title>
    <style>
        :root {
            --primary: #6d4c41;
            --accent: #d4a373;
            --bg-overlay: rgba(0, 0, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* 背景图 */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 响应式毛玻璃容器 */
        .cafe-card {
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: row; /* 横向布局 */
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 左侧：氛围展示区 */
        .display-area {
            flex: 1.2;
            background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&q=80&w=1000') center/cover;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 40px;
            color: white;
        }

        .display-area::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
        }

        .content-overlay {
            position: relative;
            z-index: 2;
        }

        /* 右侧：交互控制区 */
        .control-panel {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.3);
        }

        .back-nav {
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .back-nav:hover { transform: translateX(-5px); }

        .cafe-title {
            font-size: clamp(2rem, 4vw, 3rem);
            margin: 10px 0;
            line-height: 1.1;
            background: linear-gradient(45deg, #6d4c41, #a1887f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-tag {
            display: inline-block;
            padding: 6px 16px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-order {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(109, 76, 65, 0.2);
            margin-top: 30px;
        }

        .btn-order:hover {
            background: #3e2723;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* --- 核心：移动端屏幕适应 --- */
        @media (max-width: 850px) {
            .cafe-card {
                flex-direction: column; /* 垂直排列 */
                height: auto;
                min-height: unset;
                max-width: 500px; /* 手机端窄屏显示 */
            }

            .display-area {
                height: 280px; /* 固定图片区高度 */
                flex: none;
                padding: 30px;
            }

            .control-panel {
                padding: 30px;
                flex: none;
            }

            .cafe-title {
                margin-top: 15px;
            }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="cafe-card">
    <div class="display-area">
        <div class="content-overlay">
            <h3 style="margin:0; font-weight: 300; letter-spacing: 2px;">Specialty Coffee</h3>
            <h2 style="margin:0; font-size: 2.2rem;">每日精选</h2>
            <p style="opacity: 0.9; margin-top: 10px;">感受手冲咖啡与光影的慢节奏时光</p>
        </div>
    </div>

    <div class="control-panel">
        <div>
            <a href="index.html" class="back-nav">← Back to Campus</a>
            
            <div style="margin-top: 20px;">
                <span class="status-tag">● 正在营业中</span>
                <h1 class="cafe-title">Digital<br>Modern Cafe</h1>
                <p style="color: #636e72; line-height: 1.6; margin-top: 15px;">
                    这里不再有像素的棱角，只有极致的平滑与舒适。喝上一杯，开启你在像素广工之外的现代灵感。
                </p>
            </div>
        </div>

        <button class="btn-order" onclick="alert('订单已确认，咖啡正在为您研磨中...')">
            确认下单
        </button>
    </div>
</div>

</body>
</html>
