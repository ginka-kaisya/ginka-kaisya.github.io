<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Cafe | Responsive</title>
    <link rel="stylesheet" href="css/cafe.css">
</head>
<body>

<div class="cafe-card">
    <div class="display-area">
        <div class="content-overlay">
            <h3 style="margin:0; font-weight: 300; letter-spacing: 2px;">Specialty Coffee</h3>
            <h2 style="margin:0; font-size: 2.2rem;">每日精选</h2>
            <p style="opacity: 0.9; margin-top: 10px;">感受手冲咖啡与光影的慢节奏时光</p>
        </div>
    </div>

    <div class="control-panel">
        <div>
            <a href="index.html" class="back-nav">← Back to Campus</a>
            
            <div style="margin-top: 20px;">
                <span class="status-tag">● 正在营业中</span>
                <h1 class="cafe-title">Digital<br>Modern Cafe</h1>
                <p style="color: #636e72; line-height: 1.6; margin-top: 15px;">
                    这里不再有像素的棱角，只有极致的平滑与舒适。喝上一杯，开启你在像素广工之外的现代灵感。
                </p>
            </div>
        </div>

        <button class="btn-order" onclick="alert('订单已确认，咖啡正在为您研磨中...')">
            确认下单
        </button>
    </div>
</div>

</body>
</html>
