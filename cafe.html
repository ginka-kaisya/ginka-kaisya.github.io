<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接樱花 2.0 - 像素广工</title>
    <style>
        :root {
            --pink: #ff80ab;
            --heart: #ff5252;
            --sky-blue: #87ceeb;
            --grass-green: #9ccc65;
            --gold: #ffd700;
        }

        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom, #4fc3f7 0%, #e1f5fe 70%, #fff 100%); touch-action: none; }

        /* 背景元素 */
        .sun { position: absolute; top: 40px; right: 40px; width: 80px; height: 80px; background: #fff59d; border-radius: 50%; box-shadow: 0 0 50px #fff59d; z-index: 1; }
        .cloud { position: absolute; background: white; border-radius: 20px; opacity: 0.8; z-index: 2; animation: moveCloud linear infinite; }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: white; border-radius: 50%; }
        @keyframes moveCloud { from { left: -150px; } to { left: 100vw; } }
        .ground { position: absolute; bottom: 0; width: 100%; height: 60px; background: var(--grass-green); border-top: 5px solid #8bc34a; z-index: 10; }

        /* UI */
        #volume-control { position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(255, 255, 255, 0.9); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 20px; border: 2px solid white; }
        #status-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 70%; max-width: 400px; height: 50px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 20px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; border: 2px solid white; }
        .stat-value { font-size: 18px; font-weight: 800; color: #555; }
        #hearts { color: var(--heart); transition: all 0.3s; }

        /* 实体 */
        #basket { position: absolute; bottom: 55px; width: 90px; height: 45px; background: #795548; border-radius: 5px 5px 30px 30px; display: flex; justify-content: center; z-index: 50; transition: transform 0.1s; }
        #basket::before { content: '🧺'; font-size: 45px; margin-top: -35px; }
        
        .falling-item { position: absolute; z-index: 30; user-select: none; }
        .cherry { font-size: 30px; filter: drop-shadow(0 2px 2px rgba(255,182,193,0.5)); }
        
        /* 录取通知书样式 */
        .notice { 
            font-size: 35px; 
            background: white; 
            padding: 5px; 
            border: 2px solid var(--gold); 
            border-radius: 5px; 
            box-shadow: 0 0 15px var(--gold);
            display: flex; align-items: center; justify-content: center;
        }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal { background: white; padding: 40px; border-radius: 30px; text-align: center; }
        .btn { background: var(--pink); color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="volume-control">🔇</div>
    <div class="sun"></div>
    <div class="cloud" style="top:10%; width:100px; height:30px; animation-duration: 25s;"></div>
    <div class="cloud" style="top:25%; width:120px; height:40px; animation-duration: 40s; animation-delay: -10s;"></div>
    <div class="ground"></div>

    <div id="status-bar">
        <div class="stat-item"><span class="stat-value" id="score">0</span></div>
        <div class="stat-item"><span class="stat-value" id="level">Lv.1</span></div>
        <div class="stat-item"><span class="stat-value" id="hearts">❤️❤️❤️</span></div>
    </div>

    <div id="basket"></div>

    <div id="overlay">
        <div class="modal">
            <h1>🌸 游戏结束</h1>
            <p id="msg-body">你一共接住了 0 片樱花</p>
            <button class="btn" onclick="startGame()">再试一次</button>
            <button class="btn" style="background:#90a4ae" onclick="location.href='games.html'">退出</button>
        </div>
    </div>

    <script>
        // 音效系统
        let audioCtx, isMuted = true;
        const volumeBtn = document.getElementById('volume-control');

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        volumeBtn.addEventListener('click', () => { initAudio(); isMuted = !isMuted; volumeBtn.innerText = isMuted ? '🔇' : '🔊'; if(!isMuted) playSound('catch'); });

        function playSound(type) {
            if (isMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'catch') { osc.type = 'triangle'; osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(1046, now + 0.1); gain.gain.setValueAtTime(0.2, now); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'bonus') { osc.type = 'sine'; osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(1567, now + 0.3); gain.gain.setValueAtTime(0.3, now); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'miss') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.2); }
            else if (type === 'over') { osc.frequency.setValueAtTime(220, now); osc.frequency.exponentialRampToValueAtTime(55, now + 0.5); gain.gain.setValueAtTime(0.2, now); osc.start(); osc.stop(now + 0.5); }
        }

        // 游戏逻辑
        const basket = document.getElementById('basket');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const heartsDisplay = document.getElementById('hearts');
        const overlay = document.getElementById('overlay');
        const msgBody = document.getElementById('msg-body');

        let score = 0, lives = 3, level = 1, gameActive = false, speedMultiplier = 1, spawnRate = 1000, spawnTimer;

        const handleMove = (x) => { if(!gameActive) return; let targetX = x - basket.offsetWidth/2; targetX = Math.max(0, Math.min(window.innerWidth - basket.offsetWidth, targetX)); basket.style.left = targetX + 'px'; };
        document.addEventListener('mousemove', (e) => handleMove(e.clientX));
        document.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0].clientX); }, {passive: false});

        function createItem() {
            if(!gameActive) return;
            const item = document.createElement('div');
            item.className = 'falling-item';
            
            // 决定掉落物类型：10% 概率是录取通知书
            const isNotice = Math.random() < 0.1;
            if (isNotice) {
                item.innerHTML = '✉️';
                item.classList.add('notice');
            } else {
                item.innerHTML = '🌸';
                item.classList.add('cherry');
            }

            item.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            item.style.top = '-60px';
            document.body.appendChild(item);

            let top = -60, fallSpeed = (3 + Math.random() * 2) * speedMultiplier;
            function step() {
                if(!gameActive) { item.remove(); return; }
                top += fallSpeed;
                item.style.top = top + 'px';
                item.style.transform = `rotate(${top}deg)`;

                const bRect = basket.getBoundingClientRect(), iRect = item.getBoundingClientRect();
                if (iRect.bottom >= bRect.top && iRect.right >= bRect.left && iRect.left <= bRect.right && iRect.top <= bRect.bottom) {
                    if (isNotice) {
                        score += 5; // 通知书加5分
                        if (lives < 3) lives++; // 恢复一条命
                        playSound('bonus');
                        updateHearts();
                    } else {
                        score++;
                        playSound('catch');
                    }
                    basket.style.transform = 'scale(1.2)';
                    setTimeout(()=> basket.style.transform = 'scale(1)', 100);
                    updateUI(); item.remove(); return;
                }
                if (top > window.innerHeight) { 
                    if (!isNotice) { // 漏掉通知书不扣血，漏掉樱花扣血
                        lives--; 
                        playSound('miss'); 
                        updateHearts(); 
                    }
                    item.remove(); 
                    if(lives <= 0) endGame(); return; 
                }
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function updateUI() {
            scoreDisplay.innerText = score;
            if (score > 0 && score % 15 === 0) { // 调整升级难度
                level = Math.floor(score/15) + 1;
                levelDisplay.innerText = 'Lv.' + level;
                speedMultiplier = 1 + (level - 1) * 0.15;
                clearInterval(spawnTimer);
                spawnRate = Math.max(300, 1000 - (level * 50));
                spawnTimer = setInterval(createItem, spawnRate);
            }
        }

        function updateHearts() { heartsDisplay.innerText = "❤️".repeat(lives) + "🖤".repeat(3-lives); }
        function endGame() { gameActive = false; clearInterval(spawnTimer); playSound('over'); msgBody.innerText = `你在广工校园里接住了 ${score} 个目标！`; overlay.style.display = 'flex'; }
        
        function startGame() {
            initAudio(); score = 0; lives = 3; level = 1; speedMultiplier = 1; spawnRate = 1000; gameActive = true;
            scoreDisplay.innerText = "0"; levelDisplay.innerText = "Lv.1"; updateHearts(); overlay.style.display = 'none';
            clearInterval(spawnTimer); spawnTimer = setInterval(createItem, spawnRate);
        }
        window.onload = startGame;
    </script>
</body>
</html>
