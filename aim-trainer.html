<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打靶训练 Pro - CS:GO</title>
    <style>
        /* 这里保留之前的 CSS 样式，因为 CSS 无法简单混淆且不影响逻辑 */
        :root{--primary:#81c784;--accent:#4fc3f7;--dark:#37474f;--glass:rgba(255,255,255,.95);--bg-gradient:linear-gradient(135deg,#e3f2fd 0%,#c8e6c9 100%);--crosshair-color:#00ff00}body{margin:0;font-family:'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg-gradient);height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;cursor:none}.weapon-fire{filter:drop-shadow(0 30px 60px rgba(0,0,0,0.7)) brightness(1.6)!important}.game-wrapper{width:95vw;max-width:1000px;background:var(--glass);backdrop-filter:blur(25px);border-radius:30px;padding:25px;box-shadow:0 40px 100px rgba(0,0,0,0.1);border:1px solid rgba(255,255,255,0.7);position:relative}.dashboard{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px;cursor:default}.stat-card{background:rgba(255,255,255,0.6);padding:12px;border-radius:15px;text-align:center;border:1px solid rgba(0,0,0,0.05)}.stat-label{font-size:.7rem;color:#90a4ae;text-transform:uppercase}.stat-value{font-size:1.5rem;font-weight:800;color:var(--dark)}.timer-container{grid-column:span 3;height:6px;background:#eceff1;border-radius:10px;overflow:hidden}#timer-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .1s linear}.canvas-area{position:relative;background:#1a1a1a;border-radius:20px;overflow:hidden;border:2px solid #333}#game-canvas{display:block;width:100%;height:550px}#weapon-container{position:absolute;bottom:-50px;right:2%;width:550px;height:350px;pointer-events:none;z-index:50;transition:transform .15s cubic-bezier(0.4,0,0.2,1);filter:drop-shadow(0 30px 50px rgba(0,0,0,0.6))}#crosshair{position:absolute;width:24px;height:24px;pointer-events:none;z-index:200;display:none}.ch-line{position:absolute;background-color:var(--crosshair-color);border-radius:1px}.ch-v{width:2px;height:20px;left:11px;top:2px}.ch-h{width:20px;height:2px;top:11px;left:2px}.overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(26,26,26,0.95);z-index:100;backdrop-filter:blur(10px);cursor:default}.menu-buttons{display:flex;flex-direction:column;gap:15px;width:280px}.btn{background:#333;color:#fff;border:none;padding:16px 30px;border-radius:12px;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all .2s cubic-bezier(0.4,0,0.2,1);display:flex;justify-content:space-between;align-items:center;border:1px solid #444}.btn:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.3);background:#444;border-color:var(--primary)}.btn-secondary{background:#263238;border-color:#37474f}.btn-outline{background:transparent;color:#90a4ae;border:1px solid #444;justify-content:center}.combo-text{position:absolute;pointer-events:none;color:var(--primary);font-weight:700;z-index:10;animation:floatUp .5s ease-out forwards}@keyframes floatUp{from{opacity:1;transform:translate(-50%,0) scale(1.3)}to{opacity:0;transform:translate(-50%,-40px) scale(1)}}
    </style>
</head>
<body>
    <div id="game-init-container"></div>
    <script>
        /**
         * 动态构造 HTML 结构，防止源码直接暴露
         */
        const _container = document.getElementById('game-init-container');
        _container.innerHTML = `
            <div id="crosshair"><div class="ch-line ch-v"></div><div class="ch-line ch-h"></div></div>
            <div class="game-wrapper">
                <div class="dashboard">
                    <div class="stat-card"><div class="stat-label">SCORE</div><div id="score" class="stat-value">0</div></div>
                    <div class="stat-card"><div class="stat-label">ACCURACY</div><div id="accuracy" class="stat-value">100%</div></div>
                    <div class="stat-card"><div class="stat-label">HITS</div><div id="hits" class="stat-value">0</div></div>
                    <div class="timer-container"><div id="timer-bar"></div></div>
                </div>
                <div class="canvas-area">
                    <canvas id="game-canvas"></canvas>
                    <div id="weapon-container">
                        <svg viewBox="0 0 300 150" width="100%" height="100%">
                            <defs>
                                <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#8B0000"/><stop offset="100%" style="stop-color:#4A0000"/></linearGradient>
                                <pattern id="p1" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse"><path d="M0 0 L3 3 M3 0 L0 3" stroke="#1a1a1a" stroke-width="0.5"/></pattern>
                            </defs>
                            <g filter="drop-shadow(3px 5px 4px rgba(0,0,0,0.6))">
                                <circle cx="50" cy="115" r="9" fill="#111"/><path d="M58,108 L160,95 L165,135 L58,122 Z" fill="url(#g1)"/><path d="M80,110 L140,103 L142,125 L80,128 Z" fill="url(#p1)" opacity="0.7"/>
                                <path d="M100,75 L155,83 L155,94 L95,85 Z" fill="#1a1a1a"/><circle cx="125" cy="85" r="2.5" fill="#00ff00"><animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/></circle>
                                <path d="M160,95 L260,110 L280,160 L165,135 Z" fill="#8B0000"/><path d="M230,105 L260,110 L255,120 L235,115 Z" fill="#111"/>
                            </g>
                        </svg>
                    </div>
                    <div id="ui-menu" class="overlay">
                        <h1 style="color:#eee">AIM TRAINER PRO</h1>
                        <div class="menu-buttons">
                            <button class="btn" onclick="start('flick')">🎯 打靶训练 <span>Flick</span></button>
                            <button class="btn btn-secondary" onclick="start('track')">🔫 跟枪训练 <span>Track</span></button>
                            <button class="btn btn-outline" onclick="location.href='index.html'">退出游戏</button>
                        </div>
                    </div>
                    <div id="ui-end" class="overlay" style="display: none;">
                        <h2 id="result-rank"></h2>
                        <p id="result-detail"></p>
                        <button class="btn" style="width:200px;justify-content:center" onclick="location.href='index.html'">返回主菜单</button>
                    </div>
                </div>
            </div>`;

        // 核心：等 HTML 注入后再加载逻辑文件
        const script = document.createElement('script');
        script.src = 'api/game-config.js'; 
        document.body.appendChild(script);
    </script>
</body>
</html>
