<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打靶训练 Pro - 像素广工</title>
    <style>
        :root {
            --primary: #81c784;
            --accent: #ff8a80;
            --dark: #37474f;
            --glass: rgba(255, 255, 255, 0.92);
            --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #c8e6c9 100%);
        }

        body {
            margin: 0;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: crosshair;
        }

        /* 游戏大容器 */
        .game-wrapper {
            width: 95vw;
            max-width: 1100px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.7);
            position: relative;
        }

        /* 顶部仪表盘 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .stat-label { font-size: 0.8rem; color: #78909c; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--dark); margin-top: 5px; }

        /* 计时进度条 */
        .timer-container {
            grid-column: span 3;
            height: 8px;
            background: #eceff1;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--primary), #4fc3f7);
            transition: width 0.1s linear;
        }

        /* 画布区域 */
        .canvas-area {
            position: relative;
            background: #fdfdfd;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #eaeeef;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 550px; /* 增加了高度 */
        }

        /* 覆盖层（开始/结束） */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.8);
            z-index: 100;
            border-radius: 25px;
            backdrop-filter: blur(5px);
        }

        .btn-start {
            background: var(--dark);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-start:hover { transform: scale(1.05) translateY(-3px); background: #263238; }

        .back-home {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: #546e7a;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
        }

        /* 击中特效文字 */
        .combo-text {
            position: absolute;
            pointer-events: none;
            color: var(--primary);
            font-weight: bold;
            font-style: italic;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            from { opacity: 1; transform: translateY(0) scale(1.2); }
            to { opacity: 0; transform: translateY(-40px) scale(1); }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-label">SCORE</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">ACCURACY</div>
                <div id="accuracy" class="stat-value">100%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">HITS</div>
                <div id="hits" class="stat-value">0</div>
            </div>
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>
        </div>

        <div class="canvas-area">
            <canvas id="game-canvas"></canvas>
            
            <div id="ui-start" class="overlay">
                <h1 style="color:var(--dark); font-size: 2.5rem; margin-bottom: 30px;">READY TO AIM?</h1>
                <button class="btn-start" onclick="startGame()">START TRAINING</button>
            </div>

            <div id="ui-end" class="overlay" style="display: none;">
                <h1 id="result-title" style="color:var(--primary); margin-bottom: 10px;">EXCELLENT!</h1>
                <p id="result-score" style="font-size: 2rem; font-weight: bold; margin: 10px 0;"></p>
                <p id="result-accuracy" style="color: #78909c; margin-bottom: 30px;"></p>
                <button class="btn-start" onclick="startGame()">TRY AGAIN</button>
            </div>
        </div>

        <a href="index.html" class="back-home">🏠 返回游戏中心</a>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const timerBar = document.getElementById('timer-bar');
        
        let score = 0, hits = 0, shots = 0, timeLeft = 30;
        let gameActive = false;
        let targets = [];
        let particles = [];

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Target {
            constructor() {
                this.r = 0; // 初始半径为0，做动画
                this.maxR = Math.random() * 15 + 20;
                this.x = Math.random() * (canvas.width - this.maxR * 2) + this.maxR;
                this.y = Math.random() * (canvas.height - this.maxR * 2) + this.maxR;
                this.life = 1.0; // 生命周期 1.0 -> 0
                this.shrinkSpeed = 0.008 + Math.random() * 0.005;
            }

            draw() {
                // 绘制呼吸感的外圈
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 138, 128, ${this.life})`;
                ctx.fill();
                
                // 内圈
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();

                if(this.r < this.maxR) this.r += 2; // 出生动画
                this.life -= this.shrinkSpeed;
            }
        }

        function startGame() {
            score = 0; hits = 0; shots = 0; timeLeft = 30;
            targets = []; gameActive = true;
            document.getElementById('ui-start').style.display = 'none';
            document.getElementById('ui-end').style.display = 'none';
            updateStats();
            requestAnimationFrame(gameLoop);
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
            document.getElementById('hits').innerText = hits;
            const acc = shots === 0 ? 100 : Math.round((hits / shots) * 100);
            document.getElementById('accuracy').innerText = acc + '%';
        }

        function gameLoop() {
            if (!gameActive) return;

            // 1. 清屏并画网格线
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            // 2. 更新计时器
            timeLeft -= 1/60;
            timerBar.style.width = (timeLeft / 30) * 100 + '%';
            if (timeLeft <= 0) return endGame();

            // 3. 生成靶标
            if (Math.random() < 0.03 && targets.length < 5) {
                targets.push(new Target());
            }

            // 4. 绘制靶标
            targets = targets.filter(t => t.life > 0);
            targets.forEach(t => t.draw());

            requestAnimationFrame(gameLoop);
        }

        function drawGrid() {
            ctx.strokeStyle = '#f0f0f0';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

function endGame() {
    gameActive = false;
    const uiEnd = document.getElementById('ui-end');
    const resTitle = document.getElementById('result-title');
    const resScore = document.getElementById('result-score');
    const resAcc = document.getElementById('result-accuracy');
    
    uiEnd.style.display = 'flex';
    resScore.innerText = `SCORE: ${score}`;
    
    const acc = shots === 0 ? 0 : Math.round((hits / shots) * 100);
    resAcc.innerText = `准确率: ${acc}% | 击中数: ${hits}`;

    // --- 升级后的评分逻辑 ---
    let rank = "";
    let rankColor = "";
    let comment = "";

    if (score >= 4500 && acc >= 95) {
        rank = "SSS · 广工独孤求败";
        rankColor = "#ff1744"; // 狂暴红
        comment = "你的反应已经超越了人类极限！";
    } else if (score >= 3500 && acc >= 90) {
        rank = "SS · 顶尖职业狙神";
        rankColor = "#ff9100"; // 传说橙
        comment = "这种水平，不去打职业可惜了。";
    } else if (score >= 2500 && acc >= 80) {
        rank = "S · 宿舍战神";
        rankColor = "#f50057"; // 枪王粉
        comment = "整个宿舍楼都没人敢跟你对狙。";
    } else if (score >= 1800 && acc >= 70) {
        rank = "A · 稳健射手";
        rankColor = "#651fff"; // 优雅紫
        comment = "非常扎实的基本功，枪法很稳。";
    } else if (score >= 1000 && acc >= 50) {
        rank = "B · 及格边缘";
        rankColor = "#00b0ff"; // 能量蓝
        comment = "还有进步空间，多去图书馆练练手速。";
    } else if (hits > 0) {
        rank = "C · 人体描边大师";
        rankColor = "#78909c"; // 迷雾灰
        comment = "你是在给靶子做全身按摩吗？";
    } else {
        rank = "D · 挂机少年";
        rankColor = "#000000";
        comment = "哪怕是广工的猫，爪子拍一下也能得分。";
    }

    resTitle.innerText = rank;
    resTitle.style.color = rankColor;
    
    // 如果想额外显示评价，可以把 comment 塞进 resAcc
    resAcc.innerHTML += `<br><span style="color:${rankColor}; font-size:0.9rem; font-style:italic;">"${comment}"</span>`;
}

        canvas.addEventListener('mousedown', (e) => {
            if (!gameActive) return;
            shots++;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            let isHit = false;
            for(let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                const dist = Math.hypot(t.x - x, t.y - y);
                if (dist < t.r) {
                    hits++;
                    score += Math.round(t.life * 100); // 消失前越早点中分越高
                    targets.splice(i, 1);
                    isHit = true;
                    showComboEffect(x, y, "HIT!");
                    break;
                }
            }
            updateStats();
        });

        function showComboEffect(x, y, text) {
            const el = document.createElement('div');
            el.className = 'combo-text';
            el.innerText = text;
            el.style.left = x + 'px';
            el.style.top = (y + 100) + 'px'; // 修正容器偏移
            document.querySelector('.canvas-area').appendChild(el);
            setTimeout(() => el.remove(), 600);
        }
    </script>
</body>
</html>
