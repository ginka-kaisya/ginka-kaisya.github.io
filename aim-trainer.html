<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aim Trainer Pro - Secure Edition</title>
    <style>
        :root { --primary: #81c784; --accent: #4fc3f7; --dark: #37474f; --glass: rgba(255, 255, 255, 0.95); --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #c8e6c9 100%); --crosshair-color: #00ff00; }
        body { margin: 0; font-family: 'PingFang SC', sans-serif; background: var(--bg-gradient); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: none; }
        .game-wrapper { width: 95vw; max-width: 1000px; background: var(--glass); backdrop-filter: blur(25px); border-radius: 30px; padding: 25px; box-shadow: 0 40px 100px rgba(0,0,0,0.1); position: relative; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,0.6); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .stat-label { font-size: 0.7rem; color: #90a4ae; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--dark); }
        .timer-container { grid-column: span 3; height: 6px; background: #eceff1; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.1s linear; }
        .canvas-area { position: relative; background: #1a1a1a; border-radius: 20px; overflow: hidden; }
        #game-canvas { display: block; width: 100%; height: 550px; }
        #weapon-container { position: absolute; bottom: -50px; right: 2%; width: 550px; height: 350px; pointer-events: none; z-index: 50; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .weapon-fire { filter: brightness(1.6) !important; }
        #crosshair { position: absolute; width: 24px; height: 24px; pointer-events: none; z-index: 200; display: none; }
        .ch-line { position: absolute; background: var(--crosshair-color); }
        .ch-v { width: 2px; height: 20px; left: 11px; top: 2px; }
        .ch-h { width: 20px; height: 2px; top: 11px; left: 2px; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(26, 26, 26, 0.95); z-index: 100; backdrop-filter: blur(10px); cursor: default; }
        .btn { background: #333; color: white; border: none; padding: 16px 30px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; width: 280px; margin-bottom: 10px; }
        .combo-text { position: absolute; pointer-events: none; color: var(--primary); font-weight: bold; animation: floatUp 0.5s ease-out forwards; }
        @keyframes floatUp { from { opacity: 1; transform: translate(-50%, 0) scale(1.3); } to { opacity: 0; transform: translate(-50%, -40px) scale(1); } }
    </style>
</head>
<body>

<div id="crosshair"><div class="ch-line ch-v"></div><div class="ch-line ch-h"></div></div>

<div class="game-wrapper">
    <div class="dashboard">
        <div class="stat-card"><div class="stat-label">SCORE</div><div id="score" class="stat-value">0</div></div>
        <div class="stat-card"><div class="stat-label">ACCURACY</div><div id="accuracy" class="stat-value">100%</div></div>
        <div class="stat-card"><div class="stat-label">HITS</div><div id="hits" class="stat-value">0</div></div>
        <div class="timer-container"><div id="timer-bar"></div></div>
    </div>

    <div class="canvas-area">
        <canvas id="game-canvas"></canvas>
        <div id="weapon-container">
            <svg viewBox="0 0 300 150"><path d="M58,108 L160,95 L165,135 L58,122 Z" fill="#8B0000"/></svg>
        </div>

        <div id="ui-menu" class="overlay">
            <h1 id="menu-title" style="color:#eee">LOADING...</h1>
            <p id="menu-sub" style="color:#90a4ae"></p>
            <div id="btn-group" style="display:none">
                <button class="btn" onclick="run('flick')">🎯 打靶模式</button>
                <button class="btn" onclick="run('track')">🔫 跟枪模式</button>
            </div>
        </div>

        <div id="ui-end" class="overlay" style="display: none;">
            <h2 id="res-rank" style="font-size: 2.8rem;"></h2>
            <p id="res-detail" style="color: #78909c; text-align: center;"></p>
            <button class="btn" onclick="location.reload()">重新开始</button>
        </div>
    </div>
</div>

<script>
    // --- 核心引擎乱码部分 (Base64 封装了所有游戏逻辑) ---
    const _0xTARGET_ENGINE = "Z2FtZUFjdGl2ZSA9IHRydWU7IHNjb3JlID0gMDsgaGl0cyA9IDA7IHNob3RzID0gMDsgY29tYm8gPSAwOyBtYXhDb21ibyA9IDA7IHRhcmdldHMgPSBbXTsgcmVhbFN0YXJ0VGltZSA9IHBlcmZvcm1hbmNlLm5vdygpOyB0aW1lTGVmdCA9IGNvbmZpZy5nYW1lRHVyYXRpb247IGNyb3NzaGFpci5zdHlsZS5kaXNwbGF5ID0gJ2Jsb2NrJzsgdWlNZW51LnN0eWxlLmRpc3BsYXkgPSAnbm9uZSc7IGlmKG1vZGU9PT0ndHJhY2snKSB0YXJnZXRzLnB1c2gobmV3IFQodHJ1ZSkpOyByZXF1ZXN0QW5pbWF0aW9uRnJhbWUoZ2FtZUxvb3ApOw==";
    
    // 这里是用于渲染和判定的函数定义（同样可以进行更深度的混淆）
    let config, gameActive=false, mode='flick', score=0, hits=0, shots=0, combo=0, maxCombo=0, targets=[], timeLeft=30, realStartTime=0, mouseX=0, mouseY=0;
    const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d'), uiMenu = document.getElementById('ui-menu'), crosshair = document.getElementById('crosshair'), weapon = document.getElementById('weapon-container');

    async function init() {
        try {
            const res = await fetch('/api/game-config');
            config = await res.json();
            document.getElementById('menu-title').innerText = config.titles.main;
            document.getElementById('menu-sub').innerText = config.titles.sub;
            document.getElementById('btn-group').style.display = 'block';
        } catch(e) { document.getElementById('menu-title').innerText = "OFFLINE"; }
    }

    // 逻辑解码器（核心改装点）
    function run(m) {
        mode = m;
        // 执行 Base64 中的启动逻辑
        eval(atob(_0xTARGET_ENGINE));
    }

    // 类定义 (T = Target)
    class T {
        constructor(k){
            this.isT = k; this.r = 0; this.maxR = k ? 25 : Math.random()*10+20;
            this.x = Math.random()*(canvas.width-150)+75; this.y = Math.random()*(canvas.height-150)+75;
            this.life = 1.0; this.vx = (Math.random()-0.5)*10; this.vy = (Math.random()-0.5)*10;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
            ctx.fillStyle = this.isT ? config.crosshairColor+'aa' : config.targetColor;
            ctx.fill(); ctx.stroke();
        }
        update() {
            if(this.r < this.maxR) this.r += 2;
            if(this.isT) { this.x+=this.vx; this.y+=this.vy; if(this.x<50||this.x>canvas.width-50)this.vx*=-1; }
            else { this.life -= 0.01; }
        }
    }

    function gameLoop() {
        if(!gameActive) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        timeLeft -= 1/60;
        document.getElementById('timer-bar').style.width = (timeLeft/config.gameDuration)*100+'%';
        
        if(mode==='flick' && Math.random()<config.flickSpawnRate && targets.length<config.maxTargets) targets.push(new T(false));
        if(mode==='track') { shots++; const t=targets[0]; if(t && Math.hypot(t.x-mouseX, t.y-mouseY)<t.r){ hits++; score+=config.trackingScore; }}
        
        targets = targets.filter(t => t.life > 0);
        targets.forEach(t => { t.update(); t.draw(); });
        
        document.getElementById('score').innerText = Math.floor(score);
        document.getElementById('hits').innerText = hits;
        document.getElementById('accuracy').innerText = (shots===0?100:Math.round(hits/shots*100))+'%';

        if(timeLeft <= 0) endGame();
        else requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        crosshair.style.display = 'none';
        const dur = performance.now() - realStartTime;
        const resDetail = document.getElementById('res-detail');
        const resRank = document.getElementById('res-rank');
        
        if(dur < (config.gameDuration*1000 - 500)) {
            resRank.innerText = "ERROR";
            resDetail.innerText = config.titles.cheat;
        } else {
            let r = config.ranks.find(x => score >= x.score) || {label:"C", color:"#eee"};
            resRank.innerText = "RANK: " + r.label;
            resRank.style.color = r.color;
            resDetail.innerText = "最终得分: " + Math.floor(score);
        }
        document.getElementById('ui-end').style.display = 'flex';
    }

    // 交互逻辑
    window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
        if(gameActive) {
            crosshair.style.left = e.clientX-12+'px'; crosshair.style.top = e.clientY-12+'px';
            const sX = (e.clientX-window.innerWidth/2)*0.05;
            weapon.style.transform = `translate(${sX}px, 0px)`;
        }
    });

    canvas.addEventListener('mousedown', e => {
        if(!gameActive || mode==='track') return;
        shots++;
        weapon.classList.add('weapon-fire');
        setTimeout(()=>weapon.classList.remove('weapon-fire'), 50);
        for(let i=targets.length-1; i>=0; i--) {
            const t = targets[i];
            if(Math.hypot(t.x-mouseX, t.y-mouseY)<t.r) {
                hits++; combo++; score += config.baseScore + (combo*10);
                targets.splice(i, 1); return;
            }
        }
        combo = 0;
    });

    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    init();
</script>
</body>
</html>
