<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打靶训练 Pro - CS:GO 视角版</title>
    <style>
        :root { --primary: #81c784; --accent: #4fc3f7; --dark: #37474f; --glass: rgba(255, 255, 255, 0.95); --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #c8e6c9 100%); --crosshair-color: #00ff00; }
        body { margin: 0; font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg-gradient); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: none; }
        .weapon-fire { filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7)) brightness(1.6) !important; }
        .game-wrapper { width: 95vw; max-width: 1000px; background: var(--glass); backdrop-filter: blur(25px); border-radius: 30px; padding: 25px; box-shadow: 0 40px 100px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.7); position: relative; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; cursor: default; }
        .stat-card { background: rgba(255,255,255,0.6); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .stat-label { font-size: 0.7rem; color: #90a4ae; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--dark); }
        .timer-container { grid-column: span 3; height: 6px; background: #eceff1; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.1s linear; }
        .canvas-area { position: relative; background: #1a1a1a; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
        #game-canvas { display: block; width: 100%; height: 550px; }
        #weapon-container { position: absolute; bottom: -50px; right: 2%; width: 550px; height: 350px; pointer-events: none; z-index: 50; transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 30px 50px rgba(0,0,0,0.6)); }
        #crosshair { position: absolute; width: 24px; height: 24px; pointer-events: none; z-index: 200; display: none; }
        .ch-line { position: absolute; background-color: var(--crosshair-color); border-radius: 1px; }
        .ch-v { width: 2px; height: 20px; left: 11px; top: 2px; }
        .ch-h { width: 20px; height: 2px; top: 11px; left: 2px; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(26, 26, 26, 0.95); z-index: 100; backdrop-filter: blur(10px); cursor: default; }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; width: 280px; }
        .btn { background: #333; color: white; border: none; padding: 16px 30px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); background: #444; border-color: var(--primary); }
        .btn-outline { background: transparent; color: #90a4ae; border: 1px solid #444; justify-content: center; }
        .combo-text { position: absolute; pointer-events: none; color: var(--primary); font-weight: bold; z-index: 10; animation: floatUp 0.5s ease-out forwards; }
        @keyframes floatUp { from { opacity: 1; transform: translate(-50%, 0) scale(1.3); } to { opacity: 0; transform: translate(-50%, -40px) scale(1); } }
    </style>
</head>
<body>

<div id="crosshair">
    <div class="ch-line ch-v"></div>
    <div class="ch-line ch-h"></div>
</div>

<div class="game-wrapper">
    <div class="dashboard">
        <div class="stat-card"><div class="stat-label">SCORE</div><div id="score" class="stat-value">0</div></div>
        <div class="stat-card"><div class="stat-label">ACCURACY</div><div id="accuracy" class="stat-value">100%</div></div>
        <div class="stat-card"><div class="stat-label">HITS</div><div id="hits" class="stat-value">0</div></div>
        <div class="timer-container"><div id="timer-bar"></div></div>
    </div>

    <div class="canvas-area">
        <canvas id="game-canvas"></canvas>
        <div id="weapon-container">
            <svg viewBox="0 0 300 150" width="100%" height="100%">
                <defs>
                    <linearGradient id="crimsonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4A0000;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g filter="drop-shadow(3px 5px 4px rgba(0,0,0,0.6))">
                    <path d="M58,108 L160,95 L165,135 L58,122 Z" fill="url(#crimsonGradient)" stroke="#3a0000" stroke-width="0.5"/>
                    <path d="M100,75 L155,83 L155,94 L95,85 Z" fill="#1a1a1a" stroke="#000" />
                    <circle cx="125" cy="85" r="2.5" fill="#00ff00" opacity="0.9"><animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite" /></circle>
                    <path d="M160,95 L260,110 L280,160 L165,135 Z" fill="#8B0000" stroke="#4A0000"/>
                </g>
            </svg>
        </div>

        <div id="ui-menu" class="overlay">
            <h1 style="color:#eee; margin-bottom: 5px; letter-spacing: 2px;">AIM TRAINER PRO</h1>
            <p style="color:#90a4ae; margin-bottom: 35px;">CS:GO 视角混淆版已激活</p>
            <div class="menu-buttons">
                <button class="btn" onclick="start('flick')">🎯 打靶训练 <span>Flick</span></button>
                <button class="btn" onclick="start('track')">🔫 跟枪训练 <span>Track</span></button>
            </div>
        </div>

        <div id="ui-end" class="overlay" style="display: none;">
            <h2 id="result-rank" style="font-size: 2.8rem; margin-bottom: 5px;"></h2>
            <p id="result-detail" style="color: #78909c; text-align: center; margin-bottom: 30px;"></p>
            <button class="btn" style="width: 200px; justify-content: center;" onclick="location.reload()">重新开始</button>
        </div>
    </div>
</div>

<script>

    let _gA = false, _m = 'flick', _s = 0, _h = 0, _sh = 0, _tl = 30, _ts = [], _rS = 0, _co = 0, _mc = 0, _mx = 0, _my = 0;

            this.l = 1.0; this.vX = (Math.random() - 0.5) * 10; this.vY = (Math.random() - 0.5) * 10;

            if (this.isT) {
                this.x += this.vX; this.y += this.vY;
                if (this.x < 50 || this.x > _cv.width - 50) this.vX *= -1;
                if (this.y < 50 || this.y > _cv.height - 50) this.vY *= -1;
                this.r < this.mR && (this.r += 2);
            } else { this.r < this.mR && (this.r += 2); this.l -= 0.01; }

            _ctx.fillStyle = this.isT ? `rgba(79, 195, 247, 0.85)` : `rgba(255, 138, 128, ${this.l})`;
            _ctx.fill(); _ctx.strokeStyle = "#fff"; _ctx.stroke();

        _ch[_0xS[3]].display = _0xS[10];

        _ts = _ts.filter(t => t.l > 0); _ts.forEach(t => { t.update(); t.draw(); });
        _0xUpdateUI(); requestAnimationFrame(_0xLoop);
    }

    }

        document[_0xS[0]](_0xS[6])[_0xS[3]].display = _0xS[9];

    }

        el.style.left = x + 'px'; el.style.top = y + 'px';
        document.querySelector('.canvas-area').appendChild(el);
        setTimeout(() => el.remove(), 500);
    }
</script>
</body>
</html>
