<script type="module">
    import { GameConfig, Target, calculateHitScore } from './api/game-config.js';

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const timerBar = document.getElementById('timer-bar');
    const weaponContainer = document.getElementById('weapon-container');
    const crosshair = document.getElementById('crosshair');
    
    let gameActive = false;
    let mode = 'flick'; 
    let score = 0, hits = 0, shots = 0, timeLeft = GameConfig.DURATION;
    let targets = [];
    let realStartTime = 0; 
    let combo = 0;
    let maxCombo = 0;
    let mouseX = 0, mouseY = 0;

    // 将函数绑定到 window 以便 HTML 中的 onclick 能访问（或者改用 addEventListener）
    window.start = (selectedMode) => {
        mode = selectedMode;
        score = 0; hits = 0; shots = 0; timeLeft = GameConfig.DURATION;
        targets = [];
        gameActive = true;
        realStartTime = performance.now();
        document.getElementById('ui-menu').style.display = 'none';
        document.getElementById('ui-end').style.display = 'none';
        crosshair.style.display = 'block';
        if(mode === 'track') targets.push(new Target(canvas.width, canvas.height, true));
        requestAnimationFrame(gameLoop);
    };

    function gameLoop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 绘制背景网格
        ctx.strokeStyle = '#222';
        for(let i=0; i<canvas.width; i+=GameConfig.GRID_SIZE) { 
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); 
        }
        for(let i=0; i<canvas.height; i+=GameConfig.GRID_SIZE) { 
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); 
        }

        timeLeft -= 1/60;
        timerBar.style.width = (timeLeft / GameConfig.DURATION) * 100 + '%';
        if (timeLeft <= 0) return endGame();

        if (mode === 'flick') {
            if (Math.random() < GameConfig.FLICK_SPAWN_CHANCE && targets.length < GameConfig.MAX_TARGETS) {
                targets.push(new Target(canvas.width, canvas.height, false));
            }
        } else {
            shots++;
            const t = targets[0];
            if (t && Math.hypot(t.x - mouseX, t.y - mouseY) < t.r) { hits++; score += 5; }
        }

        targets = targets.filter(t => t.life > 0);
        targets.forEach(t => { 
            t.update(canvas.width, canvas.height); 
            t.draw(ctx); 
        });
        updateStats();
        requestAnimationFrame(gameLoop);
    }

    // 鼠标交互
    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;

        if (gameActive) {
            crosshair.style.left = e.clientX - 12 + 'px';
            crosshair.style.top = e.clientY - 12 + 'px';
            const swayX = (e.clientX - window.innerWidth / 2) * GameConfig.SWAY_INTENSITY_X;
            const swayY = (e.clientY - window.innerHeight / 2) * GameConfig.SWAY_INTENSITY_Y;
            weaponContainer.style.transform = `translate(${swayX}px, ${swayY}px) rotate(${swayX * 0.05}deg)`;
        }
    });

    canvas.addEventListener('mousedown', (e) => {
        if (!gameActive) return;
        
        // 开火视觉
        weaponContainer.classList.add('weapon-fire');
        setTimeout(() => weaponContainer.classList.remove('weapon-fire'), 60);

        weaponContainer.style.transition = 'none';
        weaponContainer.style.transform += ' translate(-8px, -40px) scale(1.04) rotate(-1.5deg)';
        
        setTimeout(() => {
            weaponContainer.style.transition = `transform ${GameConfig.RECOIL_DURATION}ms cubic-bezier(0.18, 0.89, 0.32, 1.28)`;
            const shiftX = (e.clientX - window.innerWidth / 2) * GameConfig.SWAY_INTENSITY_X;
            const shiftY = (e.clientY - window.innerHeight / 2) * GameConfig.SWAY_INTENSITY_Y;
            weaponContainer.style.transform = `translate(${shiftX}px, ${shiftY}px) rotate(${shiftX * 0.05}deg)`;
        }, 50);

        if (mode === 'track') return;
        shots++;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        for(let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            if (Math.hypot(t.x - x, t.y - y) < t.r) {
                hits++;
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                const gained = calculateHitScore(t, combo);
                score += gained;
                targets.splice(i, 1);
                showEffect(x, y, `+${gained} (x${combo})`);
                return;
            }
        }
        combo = 0;
    });

    function updateStats() {
        document.getElementById('score').innerText = Math.floor(score);
        document.getElementById('hits').innerText = hits;
        const acc = shots === 0 ? 100 : Math.round((hits / shots) * 100);
        document.getElementById('accuracy').innerText = acc + '%';
    }

    function endGame() {
        gameActive = false;
        const actualElapsed = performance.now() - realStartTime;
        const uiEnd = document.getElementById('ui-end');
        uiEnd.style.display = 'flex';
        crosshair.style.display = 'none';

        if (actualElapsed < (GameConfig.REQUIRED_TIME_MS - 100)) {
            document.getElementById('result-rank').innerText = "❌ 异常检测";
            return;
        }

        const acc = shots === 0 ? 0 : Math.round((hits / shots) * 100);
        const { rank, color } = GameConfig.getRanks(score, acc);
        
        const rankEl = document.getElementById('result-rank');
        rankEl.innerText = `RANK: ${rank}`;
        rankEl.style.color = color;
        document.getElementById('result-detail').innerHTML = `
            总分: ${Math.floor(score)} | 准确率: ${acc}% | 最高连击: ${maxCombo}
        `;
    }

    function showEffect(x, y, text) {
        const el = document.createElement('div');
        el.className = 'combo-text';
        el.innerText = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        document.querySelector('.canvas-area').appendChild(el);
        setTimeout(() => el.remove(), 500);
    }
</script>
