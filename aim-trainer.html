<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打靶训练 Pro - 最终加强版</title>
    <style>
        :root {
            --primary: #81c784;
            --accent: #4fc3f7;
            --dark: #37474f;
            --glass: rgba(255, 255, 255, 0.95);
            --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #c8e6c9 100%);
        }

        body {
            margin: 0;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: crosshair;
        }

        .game-wrapper {
            width: 95vw;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.7);
            position: relative;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.6);
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .stat-label { font-size: 0.7rem; color: #90a4ae; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--dark); }

        .timer-container {
            grid-column: span 3;
            height: 6px;
            background: #eceff1;
            border-radius: 10px;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.1s linear;
        }

        .canvas-area {
            position: relative;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #f0f4f5;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 500px;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.92);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
        }

        .btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); filter: brightness(1.2); }
        .btn-secondary { background: #546e7a; }
        .btn-outline { background: transparent; color: #90a4ae; border: 1px solid #cfd8dc; justify-content: center; }

        .combo-text {
            position: absolute;
            pointer-events: none;
            color: var(--primary);
            font-weight: bold;
            z-index: 10;
            animation: floatUp 0.5s ease-out forwards;
        }

        @keyframes floatUp {
            from { opacity: 1; transform: translate(-50%, 0) scale(1.3); }
            to { opacity: 0; transform: translate(-50%, -40px) scale(1); }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="dashboard">
        <div class="stat-card">
            <div class="stat-label">SCORE</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">ACCURACY</div>
            <div id="accuracy" class="stat-value">100%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label" id="hits-label">HITS</div>
            <div id="hits" class="stat-value">0</div>
        </div>
        <div class="timer-container">
            <div id="timer-bar"></div>
        </div>
    </div>

    <div class="canvas-area">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-menu" class="overlay">
            <h1 style="color:var(--dark); margin-bottom: 5px; letter-spacing: 1px;">AIM TRAINER PRO</h1>
            <p style="color:#90a4ae; margin-bottom: 35px;">系统时钟校验已启用</p>
            <div class="menu-buttons">
                <button class="btn" onclick="start('flick')">🎯 打靶训练 <span>Flick</span></button>
                <button class="btn btn-secondary" onclick="start('track')">🔫 跟枪训练 <span>Track</span></button>
                <button class="btn btn-outline" onclick="exit()">退出游戏</button>
            </div>
        </div>

        <div id="ui-end" class="overlay" style="display: none;">
            <h2 id="result-rank" style="font-size: 2.8rem; margin-bottom: 5px;"></h2>
            <p id="result-detail" style="color: #78909c; line-height: 1.6; margin-bottom: 30px; text-align: center;"></p>
            <button class="btn" style="width: 200px; justify-content: center;" onclick="backToMenu()">返回主菜单</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const timerBar = document.getElementById('timer-bar');
    
    let gameActive = false;
    let mode = 'flick'; 
    let score = 0, hits = 0, shots = 0, timeLeft = 30;
    let targets = [];
    let realStartTime = 0;
    let mouseX = 0, mouseY = 0;
    const GAME_DURATION = 30;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Target {
        constructor(isTracking = false) {
            this.isTracking = isTracking;
            this.r = 0;
            this.maxR = isTracking ? 28 : Math.random() * 10 + 20;
            this.x = Math.random() * (canvas.width - 150) + 75;
            this.y = Math.random() * (canvas.height - 150) + 75;
            this.life = 1.0;
            this.shrinkSpeed = isTracking ? 0 : (0.007 + Math.random() * 0.006);
            
            // 初始随机速度向量
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
        }

        update() {
            if (this.isTracking) {
                // 完全随机移动算法：每一帧都有概率改变加速度
                if (Math.random() < 0.12) {
                    this.vx += (Math.random() - 0.5) * 5;
                    this.vy += (Math.random() - 0.5) * 5;
                }

                // 速度上限控制
                const maxSpeed = 13;
                const speed = Math.hypot(this.vx, this.vy);
                if (speed > maxSpeed) {
                    this.vx = (this.vx / speed) * maxSpeed;
                    this.vy = (this.vy / speed) * maxSpeed;
                }

                // 柔性边界逻辑：靠近边缘时产生向心力
                const margin = 100;
                if (this.x < margin) this.vx += 0.9;
                if (this.x > canvas.width - margin) this.vx -= 0.9;
                if (this.y < margin) this.vy += 0.9;
                if (this.y > canvas.height - margin) this.vy -= 0.9;

                this.x += this.vx;
                this.y += this.vy;

                // 物理边界硬限制
                this.x = Math.max(this.r, Math.min(canvas.width - this.r, this.x));
                this.y = Math.max(this.r, Math.min(canvas.height - this.r, this.y));

                if(this.r < this.maxR) this.r += 2;
            } else {
                if(this.r < this.maxR) this.r += 2;
                this.life -= this.shrinkSpeed;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = this.isTracking ? `rgba(79, 195, 247, 0.85)` : `rgba(255, 138, 128, ${this.life})`;
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 绘制靶心
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
        }
    }

    function start(selectedMode) {
        mode = selectedMode;
        score = 0; hits = 0; shots = 0; timeLeft = GAME_DURATION;
        targets = [];
        gameActive = true;
        realStartTime = performance.now();

        document.getElementById('ui-menu').style.display = 'none';
        document.getElementById('ui-end').style.display = 'none';
        
        document.getElementById('hits-label').innerText = mode === 'track' ? 'TICKS' : 'HITS';

        if(mode === 'track') targets.push(new Target(true));
        
        requestAnimationFrame(gameLoop);
    }

    function gameLoop() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        // 逻辑时钟更新
        timeLeft -= 1/60;
        timerBar.style.width = (timeLeft / GAME_DURATION) * 100 + '%';

        if (timeLeft <= 0) return endGame();

        if (mode === 'flick') {
            if (Math.random() < 0.045 && targets.length < 5) {
                targets.push(new Target(false));
            }
        } else {
            // 跟枪模式每帧判定一次
            shots++; 
            const t = targets[0];
            if (t) {
                const dist = Math.hypot(t.x - mouseX, t.y - mouseY);
                if (dist < t.r) {
                    hits++;
                    score += 5; // 跟枪得分权重
                }
            }
        }

        targets = targets.filter(t => t.life > 0);
        targets.forEach(t => {
            t.update();
            t.draw();
        });

        updateStats();
        requestAnimationFrame(gameLoop);
    }

    // 实时更新鼠标坐标
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    canvas.addEventListener('mousedown', (e) => {
        if (!gameActive || mode === 'track') return;
        
        shots++;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        for(let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            const dist = Math.hypot(t.x - x, t.y - y);
            if (dist < t.r) {
                hits++;
                score += Math.round(t.life * 100);
                targets.splice(i, 1);
                showEffect(x, y, "HIT!");
                return;
            }
        }
    });

    function drawGrid() {
        ctx.strokeStyle = '#f1f3f4';
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
    }

    function updateStats() {
        document.getElementById('score').innerText = Math.floor(score);
        document.getElementById('hits').innerText = hits;
        const acc = shots === 0 ? 100 : Math.round((hits / shots) * 100);
        document.getElementById('accuracy').innerText = acc + '%';
    }

    function endGame() {
        gameActive = false;
        const realEndTime = performance.now();
        const actualElapsedSeconds = (realEndTime - realStartTime) / 1000;

        const uiEnd = document.getElementById('ui-end');
        const rank = document.getElementById('result-rank');
        const detail = document.getElementById('result-detail');
        
        uiEnd.style.display = 'flex';

        // 防作弊校验：物理耗时必须与设定耗时接近
        const tolerance = 3.5; 
        if (actualElapsedSeconds > (GAME_DURATION + tolerance)) {
            rank.innerText = "⚠️ 成绩无效";
            rank.style.color = "#ff8a80";
            detail.innerHTML = `检测到系统时钟变慢<br>实际耗时: ${actualElapsedSeconds.toFixed(1)}s (预期 30s)<br>请检查是否运行在虚拟机或开启了减速插件`;
            return;
        }

        // 正常结算
        rank.style.color = "var(--primary)";
        const acc = shots === 0 ? 0 : Math.round((hits / shots) * 100);
        
        let rankStr = "描边大师";
        if (acc > 75 && score > 3000) rankStr = "SSS·独孤求败";
        else if (acc > 55 && score > 1800) rankStr = "S·神枪手";
        else if (acc > 30) rankStr = "B·及格";
        else rankStr = "C·建议多练";

        rank.innerText = rankStr;
        detail.innerHTML = `模式: ${mode === 'flick' ? '打靶' : '跟枪'}<br>得分: ${score} | 准确率: ${acc}%<br>环境校验: 正常 (物理时间 ${actualElapsedSeconds.toFixed(1)}s)`;
    }

    function backToMenu() {
        document.getElementById('ui-end').style.display = 'none';
        document.getElementById('ui-menu').style.display = 'flex';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function showEffect(x, y, text) {
        const el = document.createElement('div');
        el.className = 'combo-text';
        el.innerText = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        document.querySelector('.canvas-area').appendChild(el);
        setTimeout(() => el.remove(), 500);
    }

    function exit() {
        if(confirm("确定要退出并重置吗？")) window.location.reload();
    }
</script>
</body>
</html>
