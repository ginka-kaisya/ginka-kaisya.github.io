<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura & Teru Teru: GDUT Edition</title>
    <style>
        :root {
            --primary: #81c784;
            --accent: #ff8a80;
            --sky-blue: #4fc3f7;
            --glass: rgba(255, 255, 255, 0.88);
            --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #c8e6c9 100%);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #37474f;
        }

        .portal-container {
            width: 95%;
            max-width: 1050px;
            display: flex;
            gap: 25px;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
            z-index: 10;
        }

        /* 左侧：像素动画窗 */
        .canvas-side {
            width: 400px;
            height: 580px;
            background: #fff;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.12);
            border: 12px solid white;
            position: relative;
            flex-shrink: 0;
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* 右侧：交互面板 */
        .content-side {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        .header h1 { 
            font-size: 2.8rem; 
            margin: 0; 
            color: #2e7d32; 
            letter-spacing: -1px;
        }

        .header p { 
            line-height: 1.7; 
            color: #546e7a; 
            font-size: 1.05rem;
            margin-top: 15px;
        }

        /* 四宫格导航网格 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: auto;    /* 修改为auto以容纳新增行 */
            gap: 16px;
            margin-top: 35px;
        }

        .nav-card {
            padding: 22px 18px;
            border-radius: 24px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .nav-card strong { font-size: 1.15rem; margin-bottom: 5px; display: block; }
        .nav-card span { font-size: 0.82rem; opacity: 0.9; font-weight: 300; line-height: 1.4; }

        .nav-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }

        /* 颜色定义 */
        .cafe-link { background: #90a4ae; }
        .entertainment-link { background: var(--sky-blue); }
        .contact-link { background: var(--accent); }
        .campus-link { background: linear-gradient(135deg, #81c784 0%, #4caf50 100%); }
        /* 新增：商品购买颜色 */
        .shop-link { background: linear-gradient(135deg, #ffb74d 0%, #f57c00 100%); }

        /* 流光扫过动画效果 */
        .nav-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -120%;
            width: 60%;
            height: 200%;
            background: rgba(255,255,255,0.15);
            transform: rotate(25deg);
            transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-card:hover::after { left: 150%; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .portal-container { flex-direction: column; align-items: center; }
            .canvas-side { width: 100%; height: 380px; }
            .content-side { padding: 30px; }
            body { overflow-y: auto; padding: 20px 0; }
        }
    </style>
</head>
<body>

<div class="portal-container">
    <div class="canvas-side">
        <canvas id="dayCanvas" width="400" height="580"></canvas>
    </div>

    <div class="content-side">
        <div class="header">
            <h1>晴空樱花</h1>
            <p>这里是像素广工的宁静角落。远处的工学馆在晨雾中若隐若现，晴天娃娃正为你守护每一份好心情。</p>
        </div>

        <div class="nav-grid">
            <a href="cafe.html" class="nav-card cafe-link">
                <strong>☕ 像素咖啡厅</strong>
                <span>光影斑驳的午后时刻</span>
            </a>
            
            <a href="games.html" class="nav-card entertainment-link">
                <strong>🎮 休闲娱乐</strong>
                <span>像素世界的放松小憩</span>
            </a>

            <a href="mailto:contact@gdut.edu" class="nav-card contact-link">
                <strong>📩 合作交流</strong>
                <span>反馈意见或商务联系</span>
            </a>

            <a href="university.html" class="nav-card campus-link">
                <strong>🏫 漫步校园</strong>
                <span>1:1 还原的现代广工</span>
            </a>

            <a href="shop.html" class="nav-card shop-link">
                <strong>🛒 商品购买</strong>
                <span>限定周边与校园纪念</span>
            </a>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('dayCanvas');
    const ctx = canvas.getContext('2d');
    const S = 6; 
    let frame = 0;

    const petals = Array.from({length: 35}, () => ({
        x: Math.random() * 100, y: Math.random() * 100,
        s: Math.random() * 0.3 + 0.2, vx: Math.random() * 0.3 + 0.1,
        r: Math.random() * Math.PI
    }));

    const clouds = [
        { x: 10, y: 25, scale: 1.2, speed: 0.04 },
        { x: 65, y: 45, scale: 0.8, speed: 0.06 }
    ];

    function p(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(Math.floor(x * S), Math.floor(y * S), Math.floor(w * S), Math.floor(h * S));
    }

    function render() {
        frame++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e3f2fd';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const bColor = '#d1e9ff';
        p(55, 65, 25, 35, bColor); p(60, 60, 10, 5, bColor);
        p(15, 75, 30, 25, bColor); p(20, 72, 15, 3, bColor);

        clouds.forEach(c => {
            c.x = (c.x + c.speed) % 120;
            p(c.x-20, c.y, 12*c.scale, 4*c.scale, 'rgba(255,255,255,0.6)');
            p(c.x-20 + 2*c.scale, c.y - 2*c.scale, 8*c.scale, 2*c.scale, 'rgba(255,255,255,0.6)');
        });

        p(0, 0, 100, 8, '#5d4037'); p(0, 7, 100, 1.5, '#3e2723');
        for(let i=0; i<10; i++) p(i*12, 0, 8, 2, '#4e342e');

        let swing = Math.sin(frame * 0.035) * 0.12;
        ctx.save();
        ctx.translate(35 * S, 8 * S);
        ctx.rotate(swing);
        p(-0.4, 0, 0.8, 15, '#90a4ae');
        ctx.translate(0, 15 * S);
        p(-4, 0, 8, 8, '#ffffff');
        p(-2, 3, 1, 1, '#37474f'); p(1, 3, 1, 1, '#37474f');
        p(-3, 5, 1, 0.5, 'rgba(255,182,193,0.6)'); p(2, 5, 1, 0.5, 'rgba(255,182,193,0.6)');
        p(-4, 8, 8, 1, '#ff5252'); p(-5, 9, 10, 9, '#ffffff');
        for(let i=0; i<3; i++) {
            let dy = Math.sin(frame * 0.1 + i) * 1.5;
            p(-5 + i*4, 18 + dy, 2, 2, '#ffffff');
        }
        ctx.restore();

        petals.forEach((pt, i) => {
            pt.y += pt.s; pt.x += pt.vx + Math.sin(frame * 0.02 + i) * 0.15;
            if(pt.y > 105) { pt.y = -5; pt.x = Math.random() * 100; }
            ctx.save();
            ctx.translate(pt.x * S, pt.y * S);
            ctx.rotate(pt.r + frame * 0.02);
            ctx.fillStyle = i % 2 === 0 ? '#ffc0cb' : '#ffffff';
            ctx.fillRect(-0.5 * S, -0.5 * S, 1.2 * S, 0.8 * S);
            ctx.restore();
        });

        for(let i=0; i<6; i++) p(i*20 - 5, 96, 15, 6, '#aed581');

        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
