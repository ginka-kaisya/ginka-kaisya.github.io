<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嵌入式工坊 - 硬件商城</title>
    <style>
        :root {
            --primary: #81c784; /* 延续主页绿 */
            --stm32-blue: #03529b; /* STM32 官方标志蓝色调 */
            --glass: rgba(255, 255, 255, 0.9);
            --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #c8e6c9 100%);
        }

        body {
            margin: 0;
            font-family: 'PingFang SC', 'Consolas', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 40px 20px;
            color: #37474f;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .shop-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .shop-header h1 { color: #2e7d32; font-size: 2.2rem; margin: 0; }
        .back-btn {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #546e7a;
            font-size: 0.9rem;
            border-bottom: 1px solid #90a4ae;
            transition: 0.3s;
        }
        .back-btn:hover { color: #2e7d32; border-color: #2e7d32; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            animation: fadeIn 1s ease-out;
        }

        .product-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .pixel-thumb {
            width: 140px;
            height: 110px;
            background: #eceff1;
            margin: 0 auto 15px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            border: 3px solid white;
            position: relative;
        }

        /* 模拟芯片引脚视觉 */
        .pixel-thumb::before {
            content: '';
            position: absolute;
            width: 110%;
            height: 80%;
            border: 2px dashed #cfd8dc;
            border-radius: 10px;
            z-index: -1;
        }

        .product-card h3 { margin: 10px 0; font-size: 1.25rem; color: #263238; }
        .product-card p { font-size: 0.88rem; color: #607d8b; line-height: 1.6; flex-grow: 1; }
        .price { color: #2e7d32; font-weight: bold; font-size: 1.4rem; margin: 15px 0; display: block; }

        .buy-now {
            background: var(--stm32-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Consolas', monospace;
        }

        .buy-now:hover { 
            background: #0277bd; 
            box-shadow: 0 5px 15px rgba(3,82,155,0.3);
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="shop-header">
        <h1>🛠️ 像素嵌入式工坊</h1>
        <p>专业 STM32 开发套件 · 助力毕业设计</p>
        <a href="index.html" class="back-btn">← 返回晴空广场 (Home.exe)</a>
    </div>

    <div class="product-grid">
        <div class="product-card">
            <div class="pixel-thumb" style="background: #e3f2fd;">📟</div>
            <h3>智能STM32游戏助手</h3>
            <p>由经典“蓝丸”板搭建，完美适配 HAL/LL 库。为您的生活增添点乐趣。</p>
            <span class="price">¥ 15.8</span>
            <button class="buy-now">FLASH_WRITE()</button>
        </div>

        <div class="product-card">
            <div class="pixel-thumb" style="background: #f1f8e9;">💓</div>
            <h3>MAX30102 传感器模块</h3>
            <p>高灵敏度血氧心率监测。支持 I2C 通讯，毕业设计制作健康监测助手的首选。</p>
            <span class="price">¥ 28.5</span>
            <button class="buy-now">I2C_READ()</button>
        </div>

        <div class="product-card">
            <div class="pixel-thumb" style="background: #fff3e0;">🔌</div>
            <h3>DAP-Link 仿真器</h3>
            <p>免驱动调试，支持 SWD 接口。稳定下载，告别复位失败的烦恼。</p>
            <span class="price">¥ 32.0</span>
            <button class="buy-now">DEBUG_START</button>
        </div>
    </div>

</body>
</html>
