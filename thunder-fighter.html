<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机：终极完整版 - 像素广工</title>
    <style>
        :root {
            --primary: #4fc3f7; --danger: #ff5252; --health: #81c784; --power: #ffca28;
        }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'PingFang SC', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; user-select: none; }
        canvas { background: radial-gradient(circle at center, #001529 0%, #000 100%); box-shadow: 0 0 50px rgba(79, 195, 247, 0.5); cursor: none; }
        
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; width: calc(100% - 40px); }
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: 0.1s; }
        .hp-container { width: 150px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: var(--health); transition: 0.3s; }
        
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 30px; border: 2px solid var(--primary); z-index: 100; pointer-events: auto; }
        .btn-retry { margin-top: 20px; padding: 12px 40px; background: var(--primary); border: none; border-radius: 25px; font-weight: bold; cursor: pointer; color: #000; }
        
        #bomb-ui { position: absolute; bottom: 20px; right: 20px; text-align: right; pointer-events: none; }
        .bomb-icon { display: inline-block; width: 25px; height: 25px; background: var(--danger); border-radius: 50%; border: 2px solid #fff; margin-left: 5px; box-shadow: 0 0 10px var(--danger); }
        
        #notice { position: absolute; width: 100%; text-align: center; font-size: 32px; font-weight: 900; color: var(--power); top: 30%; opacity: 0; pointer-events: none; transition: 0.5s; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 20px; font-weight: 800; color: var(--primary);">MISSION <span id="level-num">1</span></div>
            <div style="font-size: 18px; color: #fff;">SCORE: <span id="scoreVal">0</span></div>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="hp-container"><div id="hp-bar"></div></div>
        <div id="boss-ui" style="display:none; margin-top:10px;">
            <div id="boss-hp-bar" style="width:100%; height:12px; background:var(--danger); border:1px solid #fff;"></div>
        </div>
    </div>

    <div id="bomb-ui">BOMBS: <span id="bomb-list"></span></div>
    <div id="notice">MISSION START</div>

    <div id="overlay">
        <h2 style="color:var(--danger); font-size: 40px; margin: 0;">机体坠毁</h2>
        <p id="finalScore" style="margin: 15px 0; font-size: 20px;"></p>
        <button class="btn-retry" onclick="location.reload()">重新出击</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hpBar = document.getElementById('hp-bar');
const scoreEl = document.getElementById('scoreVal');
const levelEl = document.getElementById('level-num');
const progressBar = document.getElementById('progress-bar');
const bossUI = document.getElementById('boss-ui');
const bossHpBar = document.getElementById('boss-hp-bar');
const noticeEl = document.getElementById('notice');

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = Math.min(window.innerHeight, 750);
}
resize();

// 游戏状态
let score = 0, gameOver = false, frames = 0, level = 1, progress = 0;
let isBossMode = false, shakeFrames = 0, flashAlpha = 0, bombCount = 3;

const player = { x: 200, y: 600, w: 40, h: 40, hp: 100, invincible: 0, power: 1, weaponType: 'bullet' };
let bullets = [], enemies = [], items = [], enemyBullets = [], boss = null;

// 交互
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    player.x = (e.clientX - rect.left) - player.w/2;
});

let lastClick = 0;
canvas.addEventListener('mousedown', () => {
    let now = Date.now();
    if (now - lastClick < 300) useBomb();
    lastClick = now;
});

function useBomb() {
    if (bombCount <= 0 || gameOver) return;
    bombCount--;
    updateBombUI();
    shakeFrames = 25;
    flashAlpha = 0.8;
    enemyBullets = [];
    enemies.forEach(en => en.hp -= 30);
    if (boss) boss.hp -= 100;
    showNotice("MEGA BOMB!");
}

function updateBombUI() {
    document.getElementById('bomb-list').innerHTML = '<div class="bomb-icon"></div>'.repeat(bombCount);
}

function showNotice(txt) {
    noticeEl.innerText = txt;
    noticeEl.style.opacity = 1;
    setTimeout(() => noticeEl.style.opacity = 0, 1500);
}

function dropItem(x, y) {
    const types = ['power', 'heal', 'spread'];
    const t = types[Math.floor(Math.random() * types.length)];
    items.push({ x, y, w: 25, h: 25, type: t });
}

function spawnEnemy() {
    if (isBossMode || progress >= 100) return;
    progress += 0.8;
    progressBar.style.width = progress + '%';
    if (progress >= 100) { startBossMode(); return; }

    const r = Math.random();
    let en = { x: Math.random()*(canvas.width-40), y: -50, w:30, h:30, hp: level, type:'normal', color:'#ff5252', speed: 3 + level*0.2 };
    
    if (progress > 30 && r < 0.2) en = { ...en, w:24, h:24, hp: 2, type:'kami', color:'#ffca28', speed: 5 };
    else if (progress > 60 && r < 0.12) en = { ...en, w:60, h:40, hp: 20*level, type:'bomber', color:'#546e7a', speed: 1.5, vx: 2 };
    
    enemies.push(en);
}

function startBossMode() {
    isBossMode = true;
    bossUI.style.display = 'block';
    showNotice("BOSS ALERT");
    boss = { x: canvas.width/2 - 60, y: -120, w: 120, h: 80, hp: 200*level, maxHp: 200*level, vx: 2, state: 'entering', phase: 1 };
}

function update() {
    if (gameOver) return;
    frames++;
    if (player.invincible > 0) player.invincible--;
    if (flashAlpha > 0) flashAlpha -= 0.05;
    if (shakeFrames > 0) shakeFrames--;

    if (frames % 45 === 0) spawnEnemy();
    
    // 射击
    let fireRate = player.weaponType === 'spread' ? 12 : 8;
    if (frames % fireRate === 0) {
        if (player.weaponType === 'spread') { 
            for(let i=-2; i<=2; i++) bullets.push({ x: player.x+20, y: player.y, vx: i*2, vy: -12, color: '#f44336' }); 
        } else { 
            bullets.push({ x: player.x+5, y: player.y, vx: 0, vy: -15, color: '#fff' }); 
            bullets.push({ x: player.x+35, y: player.y, vx: 0, vy: -15, color: '#fff' });
            if (player.power >= 2) {
                bullets.push({ x: player.x+20, y: player.y, vx: -2, vy: -15, color: '#4fc3f7' });
                bullets.push({ x: player.x+20, y: player.y, vx: 2, vy: -15, color: '#4fc3f7' });
            }
        }
    }

    // 子弹更新
    bullets.forEach((b, i) => {
        b.y += b.vy; b.x += b.vx;
        if (b.y < -50) bullets.splice(i, 1);
        if (isBossMode && boss && boss.state === 'fight') {
            if (b.x > boss.x && b.x < boss.x+boss.w && b.y < boss.y+boss.h) {
                boss.hp -= (player.weaponType === 'spread' ? 0.8 : 1);
                bullets.splice(i, 1);
                bossHpBar.style.width = (boss.hp/boss.maxHp*100) + '%';
                if (boss.hp < boss.maxHp * 0.5) boss.phase = 2;
                if (boss.hp <= 0) winLevel();
            }
        }
    });

    // 敌人更新
    enemies.forEach((en, i) => {
        en.y += en.speed;
        if (en.type === 'kami') en.x += (player.x - en.x) * 0.04;
        if (en.type === 'bomber') {
            en.x += en.vx; if (en.x < 0 || en.x > canvas.width-en.w) en.vx *= -1;
            if (frames % 80 === 0) enemyBullets.push({x: en.x+en.w/2, y: en.y+en.h, vx:0, vy:5});
        }
        // 碰撞检测
        if (en.y > 0 && player.invincible <= 0) {
            if (Math.abs((player.x+20)-(en.x+en.w/2)) < 20 && Math.abs((player.y+20)-(en.y+en.h/2)) < 20) {
                takeDamage(30); enemies.splice(i, 1);
            }
        }
        bullets.forEach((b, bi) => {
            if (en.y > 0 && b.x > en.x && b.x < en.x+en.w && b.y > en.y && b.y < en.y+en.h) {
                en.hp--; bullets.splice(bi, 1);
                if (en.hp <= 0) { 
                    score += 100; scoreEl.innerText = score;
                    if (Math.random() < 0.25) dropItem(en.x, en.y);
                    enemies.splice(i, 1); 
                }
            }
        });
        if (en.y > canvas.height) enemies.splice(i, 1);
    });

    // 道具更新
    items.forEach((it, i) => {
        it.y += 2;
        if (Math.abs(it.x - (player.x + 20)) < 35 && Math.abs(it.y - (player.y + 20)) < 35) {
            if (it.type === 'power') player.power = Math.min(3, player.power + 1);
            else if (it.type === 'heal') { player.hp = Math.min(100, player.hp + 30); hpBar.style.width = player.hp + '%'; }
            else player.weaponType = it.type;
            items.splice(i, 1);
        }
        if (it.y > canvas.height) items.splice(i, 1);
    });

    // Boss 行为
    if (isBossMode && boss) {
        if (boss.state === 'entering') {
            boss.y += 1; if (boss.y >= 80) boss.state = 'fight';
        } else {
            boss.x += boss.vx * (boss.phase === 2 ? 1.8 : 1);
            if (boss.x <= 0 || boss.x >= canvas.width - boss.w) boss.vx *= -1;
            let rate = boss.phase === 2 ? 40 : 70;
            if (frames % rate === 0) {
                let c = boss.phase === 2 ? 10 : 6;
                for (let i = 0; i < c; i++) enemyBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: (i - c/2)*1.5, vy: 4 });
            }
        }
    }

    enemyBullets.forEach((eb, i) => {
        eb.x += eb.vx; eb.y += eb.vy;
        if (player.invincible <= 0 && Math.abs(eb.x - (player.x+20)) < 10 && Math.abs(eb.y - (player.y+25)) < 10) {
            takeDamage(20); enemyBullets.splice(i, 1);
        }
        if (eb.y > canvas.height) enemyBullets.splice(i, 1);
    });
}

function takeDamage(v) {
    player.hp -= v; player.invincible = 60;
    flashAlpha = 0.5; shakeFrames = 15;
    hpBar.style.width = Math.max(0, player.hp) + '%';
    if (player.hp <= 0) endGame();
}

function winLevel() {
    level++; levelEl.innerText = level;
    progress = 0; isBossMode = false; boss = null;
    enemies = []; enemyBullets = []; bullets = []; items = [];
    bossUI.style.display = 'none';
    bombCount = Math.min(3, bombCount + 1); updateBombUI();
    showNotice("MISSION CLEAR!");
}

function draw() {
    ctx.save();
    if (shakeFrames > 0) ctx.translate(Math.random()*8-4, Math.random()*8-4);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (flashAlpha > 0) { ctx.fillStyle = `rgba(255,50,50,${flashAlpha})`; ctx.fillRect(0,0,canvas.width,canvas.height); }

    // 玩家
    if (player.invincible % 4 < 2) {
        ctx.fillStyle = '#4fc3f7'; ctx.beginPath();
        ctx.moveTo(player.x+20, player.y); ctx.lineTo(player.x, player.y+40); ctx.lineTo(player.x+40, player.y+40); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(player.x+20, player.y+25, 3, 0, Math.PI*2); ctx.fill();
    }
    // Boss
    if (boss) {
        ctx.fillStyle = boss.phase === 2 ? '#ff1744' : '#d32f2f'; ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = '#000'; ctx.fillRect(boss.x+20, boss.y+20, 20, 10); ctx.fillRect(boss.x+boss.w-40, boss.y+20, 20, 10);
    }
    // 道具
    items.forEach(it => {
        const c = { power: '#ffca28', heal: '#81c784', spread: '#f44336' };
        ctx.fillStyle = c[it.type]; ctx.fillRect(it.x, it.y, it.w, it.h);
        ctx.fillStyle = '#000'; ctx.font = 'bold 14px Arial'; ctx.fillText(it.type[0].toUpperCase(), it.x+8, it.y+18);
    });
    // 子弹与敌人
    bullets.forEach(b => { ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, 4, 15); });
    enemyBullets.forEach(eb => { ctx.fillStyle = '#ff5252'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); });
    enemies.forEach(en => { ctx.fillStyle = en.color; ctx.fillRect(en.x, en.y, en.w, en.h); });

    ctx.restore();
    requestAnimationFrame(() => { update(); draw(); });
}

function endGame() {
    gameOver = true;
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('finalScore').innerText = `SCORE: ${score}`;
}

updateBombUI();
draw();
</script>
</body>
</html>
