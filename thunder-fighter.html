<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机：精英对决 - 像素广工</title>
    <style>
        :root {
            --primary: #4fc3f7;
            --danger: #ff5252;
            --health: #81c784;
            --power: #ffca28;
            --elite: #ba68c8; /* 精英怪颜色 */
        }
        body {
            margin: 0; background: #050a10; overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: white; user-select: none;
        }
        canvas {
            background: radial-gradient(circle at center, #001529 0%, #000 100%);
            box-shadow: 0 0 50px rgba(79, 195, 247, 0.2);
            cursor: none; max-width: 100vw; max-height: 100vh;
        }
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .score-board { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }
        
        /* 玩家百分比血条 */
        .hp-container {
            width: 150px; height: 10px; background: rgba(255,255,255,0.2);
            border-radius: 5px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.3);
            overflow: hidden;
        }
        #hp-bar {
            width: 100%; height: 100%; background: var(--health);
            transition: width 0.3s ease, background 0.3s ease;
        }

        /* 游戏结束遮罩 */
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; background: rgba(0,0,0,0.9);
            padding: 40px; border-radius: 30px; border: 2px solid var(--primary);
            backdrop-filter: blur(10px); z-index: 100;
        }
        .btn-retry {
            margin-top: 20px; padding: 12px 30px; background: var(--primary);
            border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-retry:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="score-board">SCORE: <span id="scoreVal">0</span></div>
        <div class="hp-container">
            <div id="hp-bar"></div>
        </div>
        <div id="weapon-lv" style="font-size: 12px; color: var(--power); margin-top: 5px;">火力: 1-路直射</div>
    </div>

    <div id="overlay">
        <h2 style="color:var(--danger); font-size: 40px; margin: 0;">机体坠毁</h2>
        <p id="finalScore" style="font-size: 20px; margin: 10px 0;"></p>
        <button class="btn-retry" onclick="resetGame()">重塑机甲</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hpBar = document.getElementById('hp-bar');
const scoreEl = document.getElementById('scoreVal');
const overlay = document.getElementById('overlay');
const weaponLvEl = document.getElementById('weapon-lv');

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = Math.min(window.innerHeight, 750);
}
resize();

// 游戏配置
let score = 0;
let gameOver = false;
let frames = 0;
let flashAlpha = 0;

// 玩家对象
const player = {
    x: canvas.width / 2, y: canvas.height - 100,
    targetX: canvas.width / 2,
    w: 44, h: 44,
    hp: 100, maxHp: 100,
    power: 1, 
    invincible: 0,
    lerp: 0.2 // 稍微加快跟随速度，更丝滑
};

const bullets = [];
const enemies = [];
const items = [];
const particles = [];

// 鼠标控制
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    player.targetX = (e.clientX - rect.left) - player.w / 2;
});

// 粒子特效
function spawnParticles(x, y, color, count = 8, speed = 10) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed,
            life: 1, decay: 0.03 + Math.random()*0.02, color
        });
    }
}

// 掉落道具逻辑
function dropItem(x, y, isElite = false) {
    const rand = Math.random();
    const dropChance = isElite ? 0.6 : 0.12; // 精英怪50%掉落，普通怪12%
    if (rand < dropChance) {
        items.push({
            x, y, w: 25, h: 25,
            type: Math.random() > 0.7 ? 'heal' : 'power', // 70% 概率掉火力，30% 回血
            speed: 2
        });
    }
}

// 核心逻辑更新
function update() {
    if (gameOver) return;
    frames++;
    if (player.invincible > 0) player.invincible--;
    if (flashAlpha > 0) flashAlpha -= 0.05;

    // 玩家移动
    player.x += (player.targetX - player.x) * player.lerp;
    
    // UI 更新
    const weaponDesc = ['', '1-路直射', '2-路侧射', 'MAX-3路散射'];
    weaponLvEl.innerText = `火力: ${weaponDesc[player.power]}`;

    // 自动射击（根据火力等级发射）
    if (frames % 8 === 0) {
        const bSpeed = -16; // 增加子弹速度
        if (player.power === 1) {
            bullets.push({ x: player.x + player.w/2 - 2, y: player.y, vx: 0, vy: bSpeed, w: 4, h: 16 });
        } else if (player.power === 2) {
            bullets.push({ x: player.x + 5, y: player.y, vx: 0, vy: bSpeed, w: 4, h: 16 });
            bullets.push({ x: player.x + player.w - 9, y: player.y, vx: 0, vy: bSpeed, w: 4, h: 16 });
        } else {
            bullets.push({ x: player.x + player.w/2 - 2, y: player.y, vx: 0, vy: bSpeed, w: 4, h: 16 });
            bullets.push({ x: player.x + 5, y: player.y, vx: -3, vy: bSpeed + 1, w: 4, h: 16 }); // 增加散射角度
            bullets.push({ x: player.x + player.w - 9, y: player.y, vx: 3, vy: bSpeed + 1, w: 4, h: 16 });
        }
    }

    // 子弹更新
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if (b.y < -20 || b.x < -20 || b.x > canvas.width + 20) bullets.splice(i, 1);
    });

    // 道具更新
    items.forEach((it, i) => {
        it.y += it.speed;
        if (it.x < player.x + player.w && it.x + it.w > player.x &&
            it.y < player.y + player.h && it.y + it.h > player.y) {
            if (it.type === 'power') player.power = Math.min(3, player.power + 1);
            if (it.type === 'heal') player.hp = Math.min(100, player.hp + 35); // 回血 35%
            updateHPBar();
            spawnParticles(player.x + player.w/2, player.y + player.h/2, it.type === 'power' ? '#fff' : '#81c784', 10, 5);
            items.splice(i, 1);
        }
        if (it.y > canvas.height) items.splice(i, 1);
    });

    // 敌机生成逻辑 (包含精英怪)
    if (frames % 25 === 0) {
        const isEliteSpawn = Math.random() < 0.15; // 15% 概率生成精英怪
        if (isEliteSpawn) {
            enemies.push({
                x: Math.random()*(canvas.width-60), y: -80,
                w: 60, h: 60, // 尺寸更大
                hp: 12, maxHp: 12, // 10枪击落
                speed: 2 + Math.random(), // 速度稍慢
                type: 'elite', color: '#ba68c8'
            });
        } else {
            enemies.push({
                x: Math.random()*(canvas.width-35), y: -50,
                w: 35, h: 35,
                hp: 1, maxHp: 1, // 一枪毙命
                speed: 3 + Math.random()*3,
                type: 'normal', color: '#ff5252'
            });
        }
    }

    // 敌机逻辑与碰撞检测
    enemies.forEach((en, i) => {
        en.y += en.speed;
        
        // 1. 撞击玩家检测
        if (player.invincible <= 0 && 
            en.x < player.x + player.w - 10 && en.x + en.w > player.x + 10 &&
            en.y < player.y + player.h - 10 && en.y + en.h > player.y + 10) {
            
            player.hp -= en.type === 'elite' ? 51 : 34; // 精英怪撞击扣 51% 血
            player.invincible = 60;
            flashAlpha = 0.6;
            updateHPBar();
            spawnParticles(player.x + player.w/2, player.y + player.h/2, '#fff', 20, 12);
            enemies.splice(i, 1); // 撞击后敌机也毁灭
            if (player.hp <= 0) endGame();
        }

        // 2. 被子弹击中检测
        bullets.forEach((b, bi) => {
            if (b.x < en.x + en.w && b.x + b.w > en.x &&
                b.y < en.y + en.h && b.y + b.h > en.y) {
                
                en.hp--; // 扣除敌机血量
                spawnParticles(b.x, b.y, en.color, 3, 3); // 小受击特效
                bullets.splice(bi, 1); // 子弹消失

                if (en.hp <= 0) {
                    // 敌机毁灭
                    spawnParticles(en.x + en.w/2, en.y + en.h/2, en.color, en.type === 'elite' ? 25 : 10, 10);
                    dropItem(en.x, en.y, en.type === 'elite');
                    enemies.splice(i, 1);
                    score += en.type === 'elite' ? 50 : 10;
                    scoreEl.innerText = score;
                }
            }
        });
        
        // 边界处理
        if (en.y > canvas.height + en.h) enemies.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    });
}

// 更新玩家血条 UI
function updateHPBar() {
    const percent = Math.max(0, player.hp);
    hpBar.style.width = percent + '%';
    // 根据血量改变颜色
    if (percent < 30) hpBar.style.background = 'var(--danger)';
    else if (percent < 60) hpBar.style.background = 'var(--power)';
    else hpBar.style.background = 'var(--health)';
}

// 核心渲染绘制
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 受击闪屏
    if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${flashAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 绘制星空背景
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    for(let i=0; i<20; i++) {
        const s = (i % 3) + 1;
        ctx.fillRect((i*77)%canvas.width, (frames*(1+i%2)+i*100)%canvas.height, s, s);
    }

    // 绘制玩家 (带无敌闪烁)
    if (!gameOver && (player.invincible % 4 < 2)) {
        // 引擎尾焰
        ctx.fillStyle = frames % 2 === 0 ? '#ffca28' : '#f4511e';
        ctx.fillRect(player.x + player.w/2 - 4, player.y + player.h - 5, 8, 12 + Math.random()*8);

        // 主体
        ctx.fillStyle = '#4fc3f7';
        ctx.beginPath();
        ctx.moveTo(player.x + player.w/2, player.y);
        ctx.lineTo(player.x, player.y + player.h);
        ctx.lineTo(player.x + player.w/2, player.y + player.h - 8);
        ctx.lineTo(player.x + player.w, player.y + player.h);
        ctx.closePath(); ctx.fill();
        // 驾驶舱
        ctx.fillStyle = '#fff';
        ctx.fillRect(player.x + player.w/2 - 2, player.y + 15, 4, 10);
    }

    // 绘制道具
    items.forEach(it => {
        ctx.fillStyle = it.type === 'power' ? '#ffca28' : '#81c784';
        ctx.fillRect(it.x, it.y, it.w, it.h);
        ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
        ctx.fillStyle = '#000'; ctx.font = 'bold 16px sans-serif'; ctx.fillText(it.type === 'power' ? 'P' : 'H', it.x + 6, it.y + 18);
        ctx.shadowBlur = 0;
    });

    // 绘制子弹
    ctx.fillStyle = '#fff59d'; ctx.shadowBlur = 8; ctx.shadowColor = '#fff59d';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
    ctx.shadowBlur = 0;

    // 绘制敌机与精英怪血条
    enemies.forEach(en => {
        ctx.fillStyle = en.color;
        
        if (en.type === 'elite') {
            // 绘制更复杂的精英怪造型
            ctx.fillRect(en.x + 10, en.y, 40, 20); // 主体
            ctx.fillRect(en.x, en.y + 15, 60, 25); // 机翼
            ctx.fillStyle = '#fff'; ctx.fillRect(en.x + 25, en.y + 10, 10, 15); // 驾驶舱
            
            // 绘制精英怪百分比血条 (头顶)
            if (en.hp < en.maxHp) {
                const barW = en.w * 0.8;
                const barH = 5;
                const barX = en.x + (en.w - barW) / 2;
                const barY = en.y - 15;
                const hpPercent = en.hp / en.maxHp;
                
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(barX, barY, barW, barH); // 背景
                ctx.fillStyle = '#81c784'; // 绿色血条
                ctx.fillRect(barX, barY, barW * hpPercent, barH); // 进度
            }
        } else {
            // 普通普通怪
            ctx.fillRect(en.x, en.y, en.w, en.h);
            ctx.fillStyle = '#000'; ctx.fillRect(en.x+5, en.y+10, 5, 5); ctx.fillRect(en.x+25, en.y+10, 5, 5);
        }
    });

    // 绘制粒子
    particles.forEach(p => {
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;

    requestAnimationFrame(() => { update(); draw(); });
}

function endGame() {
    if (gameOver) return;
    gameOver = true;
    overlay.style.display = 'block';
    document.getElementById('finalScore').innerText = `最终得分: ${score}`;
}

function resetGame() {
    score = 0; player.hp = 100; player.power = 1;
    frames = 0; enemies.length = 0; bullets.length = 0;
    items.length = 0; particles.length = 0;
    gameOver = false; overlay.style.display = 'none';
    updateHPBar(); scoreEl.innerText = "0";
}

// 启动游戏
draw();
</script>
</body>
</html>
