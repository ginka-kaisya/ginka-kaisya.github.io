<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机：终极完整版 - 像素广工</title>
    <style>
        :root {
            --primary: #4fc3f7; --danger: #ff5252; --health: #81c784; --power: #ffca28;
        }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'PingFang SC', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; user-select: none; }
        canvas { background: radial-gradient(circle at center, #001529 0%, #000 100%); box-shadow: 0 0 50px rgba(79, 195, 247, 0.5); cursor: none; }
        
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; width: calc(100% - 40px); }
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: 0.1s; }
        .hp-container { width: 150px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: var(--health); transition: 0.3s; }
        
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 30px; border: 2px solid var(--primary); z-index: 100; pointer-events: auto; }
        .btn-retry { margin-top: 20px; padding: 12px 40px; background: var(--primary); border: none; border-radius: 25px; font-weight: bold; cursor: pointer; color: #000; }
        
        #bomb-ui { position: absolute; bottom: 20px; right: 20px; text-align: right; pointer-events: none; }
        .bomb-icon { display: inline-block; width: 25px; height: 25px; background: var(--danger); border-radius: 50%; border: 2px solid #fff; margin-left: 5px; box-shadow: 0 0 10px var(--danger); }
        
        #notice { position: absolute; width: 100%; text-align: center; font-size: 32px; font-weight: 900; color: var(--power); top: 30%; opacity: 0; pointer-events: none; transition: 0.5s; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

        <div id="start-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
    <h1 style="color: var(--primary); font-size: 48px; margin-bottom: 10px; text-shadow: 0 0 20px var(--primary);">雷霆战机</h1>
    <p style="color: #fff; font-size: 16px; margin-bottom: 30px; opacity: 0.8;">像素广工 · 终极完整版</p>
    
    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 30px; font-size: 14px; line-height: 1.6;">
        <p>🖱️ 鼠标/触摸：控制机体移动</p>
        <p>👆 双击：释放超必杀轰炸</p>
        <p>🎁 道具：P(火力) H(回血) S(散弹) L(激光)</p>
    </div>

    <button class="btn-retry" onclick="startGame()" style="font-size: 20px; padding: 15px 60px;">出 击</button>
</div>
        
    <div id="ui-layer">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 20px; font-weight: 800; color: var(--primary);">MISSION <span id="level-num">1</span></div>
            <div style="font-size: 18px; color: #fff;">SCORE: <span id="scoreVal">0</span></div>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="hp-container"><div id="hp-bar"></div></div>
        <div id="boss-ui" style="display:none; margin-top:10px;">
            <div id="boss-hp-bar" style="width:100%; height:12px; background:var(--danger); border:1px solid #fff;"></div>
        </div>
    </div>

    <div id="bomb-ui">BOMBS: <span id="bomb-list"></span></div>
    <div id="notice">MISSION START</div>

    <div id="overlay">
        <h2 style="color:var(--danger); font-size: 40px; margin: 0;">机体坠毁</h2>
        <p id="finalScore" style="margin: 15px 0; font-size: 20px;"></p>
        <button class="btn-retry" onclick="resetGame()">重新出击</button>    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hpBar = document.getElementById('hp-bar');
const scoreEl = document.getElementById('scoreVal');
const levelEl = document.getElementById('level-num');
const progressBar = document.getElementById('progress-bar');
const bossUI = document.getElementById('boss-ui');
const bossHpBar = document.getElementById('boss-hp-bar');
const noticeEl = document.getElementById('notice');

function resize() {
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = Math.min(window.innerHeight, 750);
}
resize();

// 游戏状态
// 修改：增加 gameStarted 状态，初始为 false
let score = 0, gameOver = false, gameStarted = false, frames = 0, level = 1, progress = 0;
let isBossMode = false, shakeFrames = 0, flashAlpha = 0, bombCount = 3;

const player = { 
    x: 200, 
    y: 600, 
    targetX: 200, 
    targetY: 600, 
    w: 40, 
    h: 40, 
    hp: 100, 
    invincible: 0, 
    power: 1,         // 这里的 power 对应 weaponLevel
    weaponType: 'bullet' // 初始武器
};
let bullets = [], enemies = [], items = [], enemyBullets = [], boss = null;

// 交互更新：支持全屏坐标追踪
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    // 减去宽高的一半，使飞机中心跟随鼠标
    player.targetX = (e.clientX - rect.left) - player.w / 2;
    player.targetY = (e.clientY - rect.top) - player.h / 2;
});

// 如果是移动端，添加触摸支持
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    player.targetX = (touch.clientX - rect.left) - player.w / 2;
    player.targetY = (touch.clientY - rect.top) - player.h / 2;
}, { passive: false });

let lastClick = 0;
canvas.addEventListener('mousedown', () => {
    let now = Date.now();
    if (now - lastClick < 300) useBomb();
    lastClick = now;
});

function useBomb() {
    if (bombCount <= 0 || gameOver) return;
    bombCount--;
    updateBombUI();
    shakeFrames = 25;
    flashAlpha = 0.8;
    enemyBullets = [];
    enemies.forEach(en => en.hp -= 30);
    if (boss) boss.hp -= 100;
    showNotice("MEGA BOMB!");
}

function updateBombUI() {
    document.getElementById('bomb-list').innerHTML = '<div class="bomb-icon"></div>'.repeat(bombCount);
}

function showNotice(txt) {
    noticeEl.innerText = txt;
    noticeEl.style.opacity = 1;
    setTimeout(() => noticeEl.style.opacity = 0, 1500);
}

//道具
function dropItem(x, y) {
    // 增加了 'lightning' (L) 道具
    const types = ['power', 'heal', 'spread', 'lightning']; 
    const t = types[Math.floor(Math.random() * types.length)];
    items.push({ x, y, w: 25, h: 25, type: t });
}

function spawnEnemy() {
    if (isBossMode || progress >= 100) return;
    progress += 1.5;
    progressBar.style.width = progress + '%';
    if (progress >= 100) { startBossMode(); return; }

    const r = Math.random();
    let en = { x: Math.random()*(canvas.width-40), y: -50, w:30, h:30, hp: level, type:'normal', color:'#ff5252', speed: 3 + level*0.2 };

    if (progress > 50 && r < 0.15) {
        en = { 
            ...en, 
            w:26, 
            h:26, 
            hp: 3, 
            type:'sniper', 
            color:'#b388ff', 
            speed: 1.2,
            cooldown: 120
        };
    }
    else if (progress > 30 && r < 0.2) {
        en = { ...en, w:24, h:24, hp: 2, type:'kami', color:'#ffca28', speed: 5 };
    }
    else if (progress > 60 && r < 0.12) {
        en = { ...en, w:60, h:40, hp: 20*level, type:'bomber', color:'#546e7a', speed: 1.5, vx: 2 };
    }

    enemies.push(en);
}

function startBossMode() {
    isBossMode = true;
    bossUI.style.display = 'block';
    showNotice("BOSS ALERT");
    boss = { x: canvas.width/2 - 60, y: -120, w: 120, h: 80, hp: 200*level, maxHp: 200*level, vx: 2, state: 'entering', phase: 1 };
}

function startGame() {
    gameStarted = true;
    document.getElementById('start-screen').style.display = 'none';
    showNotice("READY... GO!");
}

function update() {
    if (!gameStarted || gameOver) return; // 修改：如果没开始，直接跳过逻辑更新
    frames++;
    // ... 原有代码保持不变
    
    // 平滑移动逻辑 (缓动系数 0.2 让手感更丝滑)
    player.x += (player.targetX - player.x) * 0.2;
    player.y += (player.targetY - player.y) * 0.2;

    // 全屏边界判定
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
    if (player.y < 0) player.y = 0;
    if (player.y > canvas.height - player.h) player.y = canvas.height - player.h;

    if (player.invincible > 0) player.invincible--;
    if (flashAlpha > 0) flashAlpha -= 0.05;
    if (shakeFrames > 0) shakeFrames--;

    if (frames % 45 === 0) spawnEnemy();
    
// 射击逻辑
let fireRate = player.weaponType === 'lightning' ? 5 : 8;
    if (frames % fireRate === 0) {
        const lv = player.power; // 当前等级 1-3

        if (player.weaponType === 'spread') {
            // --- 散弹 S 升级逻辑 ---
            // 1级: 3路 | 2级: 5路 | 3级: 7路全屏覆盖
            let count = lv === 1 ? 3 : (lv === 2 ? 5 : 7);
            for(let i = 0; i < count; i++) {
                bullets.push({ 
                    x: player.x + 20, y: player.y, 
                    vx: (i - (count-1)/2) * 2.5, vy: -10, 
                    color: '#f44336', isSpread: true 
                });
            }
        } 
        else if (player.weaponType === 'lightning') {
            // --- 电弧 L 升级逻辑 ---
            // 1级: 1束 | 2级: 2束平行 | 3级: 3束带小幅自动追踪
            for(let i = 0; i < lv; i++) {
                bullets.push({ 
                    x: player.x + (i * 15) + (20 - lv * 7.5), 
                    y: player.y, vx: 0, vy: -20, 
                    color: '#ea80fc', isLightning: true 
                });
            }
        } 
        else {
            // --- 普通弹 Bullet 升级逻辑 ---
            // 1级: 双射 | 2级: 四射 | 3级: 六射(带侧翼)
            bullets.push({ x: player.x + 5, y: player.y, vx: 0, vy: -15, color: '#fff' });
            bullets.push({ x: player.x + 35, y: player.y, vx: 0, vy: -15, color: '#fff' });
            if (lv >= 2) {
                bullets.push({ x: player.x - 5, y: player.y + 10, vx: -0.5, vy: -15, color: '#4fc3f7' });
                bullets.push({ x: player.x + 45, y: player.y + 10, vx: 0.5, vy: -15, color: '#4fc3f7' });
            }
            if (lv >= 3) {
                bullets.push({ x: player.x + 20, y: player.y - 10, vx: -1.5, vy: -14, color: '#fff' });
                bullets.push({ x: player.x + 20, y: player.y - 10, vx: 1.5, vy: -14, color: '#fff' });
            }
        }
    }

    // 子弹更新
    bullets.forEach((b, i) => {
        b.y += b.vy; b.x += b.vx;
        if (b.y < -50) bullets.splice(i, 1);
        if (isBossMode && boss && boss.state === 'fight') {
            if (b.x > boss.x && b.x < boss.x+boss.w && b.y < boss.y+boss.h) {
                boss.hp -= (player.weaponType === 'spread' ? 0.8 : 1);
                bullets.splice(i, 1);
                bossHpBar.style.width = (boss.hp/boss.maxHp*100) + '%';
                if (boss.hp < boss.maxHp * 0.5) boss.phase = 2;
                if (boss.hp <= 0) winLevel();
            }
        }
    });

    // 敌人更新
    enemies.forEach((en, i) => {
        en.y += en.speed;
        if (en.type === 'kami') en.x += (player.x - en.x) * 0.04;
if (en.type === 'sniper') {
    en.y += 0.5;

    if (frames % en.cooldown === 0) {
        let dx = (player.x + 20) - (en.x + en.w/2);
        let dy = (player.y + 20) - (en.y + en.h/2);
        let len = Math.sqrt(dx*dx + dy*dy);

        enemyBullets.push({
            x: en.x + en.w/2,
            y: en.y + en.h/2,
            vx: dx/len * 8,
            vy: dy/len * 8
        });
    }
}

        if (en.type === 'bomber') {
            en.x += en.vx; if (en.x < 0 || en.x > canvas.width-en.w) en.vx *= -1;
            if (frames % 80 === 0) enemyBullets.push({x: en.x+en.w/2, y: en.y+en.h, vx:0, vy:5});
        }
        // 碰撞检测
        if (en.y > 0 && player.invincible <= 0) {
            if (Math.abs((player.x+20)-(en.x+en.w/2)) < 20 && Math.abs((player.y+20)-(en.y+en.h/2)) < 20) {
                takeDamage(30); enemies.splice(i, 1);
            }
        }
        bullets.forEach((b, bi) => {
            if (en.y > 0 && b.x > en.x && b.x < en.x+en.w && b.y > en.y && b.y < en.y+en.h) {
                en.hp--; bullets.splice(bi, 1);
                if (en.hp <= 0) { 
                    score += 100; scoreEl.innerText = score;
                    if (Math.random() < 0.25) dropItem(en.x, en.y);
                    enemies.splice(i, 1); 
                }
            }
        });
        if (en.y > canvas.height) enemies.splice(i, 1);
    });

    // 道具更新
    items.forEach((it, i) => {
        it.y += 2;
if (Math.abs(it.x - (player.x + 20)) < 35 && Math.abs(it.y - (player.y + 20)) < 35) {
        if (it.type === 'power') {
            // 捡到 P：最高升到 3 级
            player.power = Math.min(3, player.power + 1);
            showNotice("POWER UP! LV" + player.power);
        } else if (it.type === 'heal') {
            player.hp = Math.min(100, player.hp + 30);
            hpBar.style.width = player.hp + '%';
        } else {
            // 捡到 S 或 L：切换武器，等级不变
            player.weaponType = it.type;
            const name = it.type === 'spread' ? "SPREAD SHOT" : "PLASMA ARC";
            showNotice(name + " LV" + player.power);
        }
        items.splice(i, 1);
    }
        if (it.y > canvas.height) items.splice(i, 1);
    });

    // Boss 行为
    if (isBossMode && boss) {
        if (boss.state === 'entering') {
            boss.y += 1; if (boss.y >= 80) boss.state = 'fight';
        } else {
            boss.x += boss.vx * (boss.phase === 2 ? 1.8 : 1);
            if (boss.x <= 0 || boss.x >= canvas.width - boss.w) boss.vx *= -1;
            let rate = boss.phase === 2 ? 40 : 70;
            if (frames % rate === 0) {
                let c = boss.phase === 2 ? 10 : 6;
                for (let i = 0; i < c; i++) enemyBullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h, vx: (i - c/2)*1.5, vy: 4 });
            }
        }
    }

    enemyBullets.forEach((eb, i) => {
        eb.x += eb.vx; eb.y += eb.vy;
        if (player.invincible <= 0 && Math.abs(eb.x - (player.x+20)) < 10 && Math.abs(eb.y - (player.y+25)) < 10) {
            takeDamage(20); enemyBullets.splice(i, 1);
        }
        if (eb.y > canvas.height) enemyBullets.splice(i, 1);
    });
}

function takeDamage(v) {
    player.hp -= v; player.invincible = 60;
    flashAlpha = 0.5; shakeFrames = 15;
    hpBar.style.width = Math.max(0, player.hp) + '%';
    if (player.hp <= 0) endGame();
}

function winLevel() {
    level++; levelEl.innerText = level;
    progress = 0; isBossMode = false; boss = null;
    enemies = []; enemyBullets = []; bullets = []; items = [];
    bossUI.style.display = 'none';
    bombCount = Math.min(3, bombCount + 1); updateBombUI();
    showNotice("MISSION CLEAR!");
}

function draw() {
    ctx.save();
    if (shakeFrames > 0) ctx.translate(Math.random()*8-4, Math.random()*8-4);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (flashAlpha > 0) { ctx.fillStyle = `rgba(255,50,50,${flashAlpha})`; ctx.fillRect(0,0,canvas.width,canvas.height); }

    // 玩家
// --- 优化版：玩家模型 (进阶战机) ---
    if (player.invincible % 4 < 2) {
        ctx.save();
        ctx.translate(player.x + player.w / 2, player.y + player.h / 2);

        // 1. 引擎喷火效果 (动态律动)
        const flameHeight = 15 + Math.random() * 10;
        const gradFlame = ctx.createLinearGradient(0, 10, 0, 10 + flameHeight);
        gradFlame.addColorStop(0, '#4fc3f7');
        gradFlame.addColorStop(1, 'transparent');
        ctx.fillStyle = gradFlame;
        ctx.beginPath();
        ctx.moveTo(-8, 15);
        ctx.lineTo(0, 15 + flameHeight);
        ctx.lineTo(8, 15);
        ctx.fill();

        // 2. 绘制机翼 (深色金属感)
        ctx.fillStyle = '#0288d1';
        ctx.beginPath();
        ctx.moveTo(-20, 5); ctx.lineTo(-20, 15); ctx.lineTo(0, 0); // 左翼
        ctx.moveTo(20, 5); ctx.lineTo(20, 15); ctx.lineTo(0, 0);   // 右翼
        ctx.fill();

        // 3. 绘制主机身 (流线型)
        ctx.fillStyle = '#4fc3f7';
        ctx.beginPath();
        ctx.moveTo(0, -20);    // 尖端
        ctx.bezierCurveTo(-12, -5, -12, 15, 0, 18); // 左侧曲线
        ctx.bezierCurveTo(12, 15, 12, -5, 0, -20);  // 右侧曲线
        ctx.fill();

        // 4. 驾驶舱 (高光玻璃)
        ctx.fillStyle = '#e1f5fe';
        ctx.beginPath();
        ctx.ellipse(0, -5, 4, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 5. 挂载武器 (随火力等级变化)
        if (player.power >= 2) {
            ctx.fillStyle = '#b3e5fc';
            ctx.fillRect(-18, 5, 4, 10); // 左侧炮口
            ctx.fillRect(14, 5, 4, 10);  // 右侧炮口
        }

        // 6. 核心判定点提示 (微弱呼吸灯效果)
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#fff';
        ctx.beginPath();
        ctx.arc(0, 5, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    // Boss
if (boss) {
        ctx.save();
        // 核心机体
        ctx.fillStyle = boss.phase === 2 ? '#ff1744' : '#d32f2f';
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        
        // 装甲阴影
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(boss.x, boss.y + boss.h - 10, boss.w, 10);
        
        // 侧翼装饰
        ctx.fillStyle = '#9a0007';
        ctx.fillRect(boss.x - 10, boss.y + 20, 10, 40);
        ctx.fillRect(boss.x + boss.w, boss.y + 20, 10, 40);

        // 能量核心 (随帧率律动)
        let pulse = Math.sin(frames * 0.1) * 5;
        ctx.fillStyle = boss.phase === 2 ? '#fff' : '#4fc3f7';
        ctx.beginPath();
        ctx.arc(boss.x + boss.w / 2, boss.y + boss.h / 2, 15 + pulse, 0, Math.PI * 2);
        ctx.fill();

        // 眼睛/观察口
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(boss.x + 25, boss.y + 15, 25, 8);
        ctx.fillRect(boss.x + boss.w - 50, boss.y + 15, 25, 8);
        ctx.restore();
    }
    // 道具
    items.forEach(it => {
        // 定义颜色表，确保包含所有类型
        const colors = { 
            power: '#ffca28',     // 金色 P
            heal: '#81c784',      // 绿色 H
            spread: '#f44336',    // 红色 S
            lightning: '#ea80fc'  // 紫色 L
        };
        
        const itemColor = colors[it.type] || '#ffffff';

        ctx.save();
        // 1. 绘制发光外框
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(it.x, it.y, it.w, it.h);

        // 2. 绘制填充背景
        ctx.fillStyle = itemColor;
        ctx.fillRect(it.x, it.y, it.w, it.h);

        // 3. 绘制道具字母 (P, H, S, L)
        ctx.fillStyle = '#000';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // 字母居中显示
        ctx.fillText(it.type[0].toUpperCase(), it.x + it.w/2, it.y + it.h/2 + 1);
        
        // 4. 添加简单的流光动画 (随时间偏移)
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.moveTo(it.x, it.y + it.h);
        ctx.lineTo(it.x + it.w, it.y);
        ctx.stroke();
        
        ctx.restore();
    });

    // 子弹与敌人
// --- 升级版 玩家子弹绘制 ---
    bullets.forEach(b => {
        ctx.save();
        // 添加发光滤镜
        ctx.shadowBlur = 10;
        ctx.shadowColor = b.color || '#fff';
        
        if (player.weaponType === 'spread') {
            // 散弹：炽热能量球
            let grad = ctx.createRadialGradient(b.x + 3, b.y + 3, 1, b.x + 3, b.y + 3, 6);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.4, '#ff9800');
            grad.addColorStop(1, '#f44336');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(b.x + 3, b.y + 3, 6, 0, Math.PI * 2);
            ctx.fill();
        } else {
            // 普通/强化子弹：梭形等离子束
            ctx.fillStyle = b.color || '#fff';
            // 绘制一个带尖头的梭形
            ctx.beginPath();
            ctx.moveTo(b.x, b.y + 15);
            ctx.lineTo(b.x + 4, b.y);
            ctx.lineTo(b.x + 8, b.y + 15);
            ctx.closePath();
            ctx.fill();
            
            // 绘制核心亮线
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(b.x + 4, b.y + 2);
            ctx.lineTo(b.x + 4, b.y + 12);
            ctx.stroke();
        }
        ctx.restore();
    });

    // --- 升级版 敌机子弹绘制 ---
    enemyBullets.forEach(eb => {
        ctx.save();
        // 外部红色光圈
        ctx.fillStyle = '#ff5252';
        ctx.beginPath();
        ctx.arc(eb.x, eb.y, 6, 0, Math.PI * 2);
        ctx.fill();
        
        // 内部白色亮芯 (让弹幕更醒目，减少莫名掉血感)
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(eb.x, eb.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
        
        // 添加一个微弱的拖尾
        ctx.strokeStyle = 'rgba(255, 82, 82, 0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(eb.x, eb.y);
        ctx.lineTo(eb.x - (eb.vx || 0) * 2, eb.y - (eb.vy || 5) * 2);
        ctx.stroke();
        ctx.restore();
    });

   // --- 极精细化 敌机模型绘制 ---
    enemies.forEach(en => {
        ctx.save();
        ctx.translate(en.x + en.w / 2, en.y + en.h / 2);

        if (en.type === 'normal') {
            // 【精锐截击机】
            // 1. 底层侧翼（带金属渐变）
            let wingGrad = ctx.createLinearGradient(-20, 0, 20, 0);
            wingGrad.addColorStop(0, '#455a64');
            wingGrad.addColorStop(0.5, '#90a4ae');
            wingGrad.addColorStop(1, '#455a64');
            ctx.fillStyle = wingGrad;
            ctx.beginPath();
            ctx.moveTo(-20, -5); ctx.lineTo(20, -5); ctx.lineTo(0, 18);
            ctx.closePath(); ctx.fill();

            // 2. 主机身装甲
            ctx.fillStyle = '#263238';
            ctx.beginPath();
            ctx.moveTo(-6, -15); ctx.lineTo(6, -15); 
            ctx.lineTo(8, 5); ctx.lineTo(-8, 5);
            ctx.closePath(); ctx.fill();

            // 3. 红色能量灯带（呼吸感）
            let pulse = (Math.sin(frames * 0.2) + 1) * 0.5;
            ctx.shadowBlur = 8 * pulse;
            ctx.shadowColor = '#ff1744';
            ctx.fillStyle = `rgba(255, 23, 68, ${0.5 + 0.5 * pulse})`;
            ctx.fillRect(-4, -8, 8, 2);
        } 
        else if (en.type === 'kami') {
            // 【核心过载机】
            // 1. 外部环绕护盾碎片
            ctx.rotate(frames * 0.15);
            ctx.strokeStyle = 'rgba(255, 202, 40, 0.6)';
            ctx.lineWidth = 2;
            for(let i=0; i<4; i++) {
                ctx.rotate(Math.PI/2);
                ctx.beginPath(); ctx.arc(14, 0, 5, 0, Math.PI); ctx.stroke();
            }
            // 2. 球形聚能核心
            let coreGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 12);
            coreGrad.addColorStop(0, '#fff');
            coreGrad.addColorStop(0.3, '#ffca28');
            coreGrad.addColorStop(1, 'rgba(255, 82, 82, 0)');
            ctx.fillStyle = coreGrad;
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
        } 

else if (en.type === 'sniper') {
    // 狙击无人机
    ctx.fillStyle = '#311b92';
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();

    // 瞄准激光
    ctx.strokeStyle = '#b388ff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(player.x - en.x, player.y - en.y);
    ctx.stroke();

    // 中心能量点
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();
}

        else if (en.type === 'bomber') {
            // 【重型空中堡垒】
            // 1. 左右巨大的涡轮引擎
            const drawEngine = (side) => {
                ctx.fillStyle = '#212121';
                ctx.fillRect(side * 22 - 6, -12, 12, 24);
                // 引擎内部红光
                ctx.fillStyle = '#b71c1c';
                ctx.fillRect(side * 22 - 3, 8, 6, 4);
                // 进气口金属环
                ctx.strokeStyle = '#78909c';
                ctx.strokeRect(side * 22 - 6, -12, 12, 5);
            };
            drawEngine(1); drawEngine(-1);

            // 2. 多层复合装甲机身
            let bodyGrad = ctx.createLinearGradient(-25, 0, 25, 0);
            bodyGrad.addColorStop(0, '#37474f');
            bodyGrad.addColorStop(0.5, '#546e7a');
            bodyGrad.addColorStop(1, '#37474f');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.moveTo(-25, -15); ctx.lineTo(25, -15);
            ctx.lineTo(30, 10); ctx.lineTo(10, 20);
            ctx.lineTo(-10, 20); ctx.lineTo(-30, 10);
            ctx.closePath(); ctx.fill();

            // 3. 观察窗点阵
            ctx.fillStyle = '#00e5ff';
            ctx.shadowBlur = 5; ctx.shadowColor = '#00e5ff';
            for(let i=-1; i<=1; i++) {
                ctx.beginPath(); ctx.arc(i*8, -5, 2, 0, Math.PI*2); ctx.fill();
            }
        }
        ctx.restore();
    });

    ctx.restore();
    requestAnimationFrame(() => { update(); draw(); });
}

function endGame() {
    gameOver = true;
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('finalScore').innerText = `SCORE: ${score}`;
}

function resetGame() {
    // 1. 重置基础状态
    score = 0;
    gameOver = false;
    frames = 0;
    level = 1;
    progress = 0;
    isBossMode = false;
    boss = null;
    bombCount = 3;

    // 2. 清空所有数组（子弹、敌人、道具）
    bullets = [];
    enemies = [];
    items = [];
    enemyBullets = [];

    // 3. 重置玩家属性
    player.hp = 100;
    player.x = canvas.width / 2 - player.w / 2;
    player.y = canvas.height - 100;
    player.targetX = player.x;
    player.targetY = player.y;
    player.power = 1; // 回到 1 级火力
    player.weaponType = 'bullet';
    player.invincible = 60; // 开局送 1 秒无敌，防止原地暴毙

    // 4. 更新 UI 显示
    scoreEl.innerText = score;
    levelEl.innerText = level;
    hpBar.style.width = '100%';
    progressBar.style.width = '0%';
    bossUI.style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
    updateBombUI();
    
    showNotice("MISSION RESTART");

    // 5. 重新启动循环 (如果之前停止了的话)
    // 注意：因为 draw 函数一直在 requestAnimationFrame，所以只要 gameOver 设为 false，循环会自动恢复
}

updateBombUI();
draw();
</script>
