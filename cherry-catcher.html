<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接樱花 5.1 - 典藏全功能版</title>
    <style>
        :root {
            --gdut-red: #d32f2f;
            --gold: #fbc02d;
            --glass: rgba(255, 255, 255, 0.82);
            --primary: #6d4c41;
            --gray: #607d8b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; overflow: hidden;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #a5d6a7 linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), 
                        url('https://images.unsplash.com/photo-1523050338692-7b835a07973f?auto=format&fit=crop&q=80&w=2000') center/cover;
            height: 100vh; touch-action: none;
        }

        /* --- 通用卡片样式 --- */
        .glass-overlay {
            position: fixed; inset: 0; z-index: 3000;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
            transition: opacity 0.5s ease;
        }

        .card {
            background: var(--glass);
            padding: 35px; border-radius: 28px;
            width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.4);
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- 按钮系统 --- */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 14px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-main { background: var(--gdut-red); color: white; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
        .btn-sub { background: white; color: var(--gray); border: 2px solid #eee; }
        .btn-sub:active { background: #f5f5f5; }

        /* --- 音效开关 --- */
        .audio-control {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin: 15px 0; padding: 10px;
            background: rgba(0,0,0,0.05); border-radius: 12px;
        }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; inset: 0; background: #ccc; 
            transition: .3s; border-radius: 34px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 18px; width: 18px; 
            left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; 
        }
        input:checked + .slider { background: var(--gdut-red); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- 游戏 UI --- */
        #status-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 480px; padding: 12px 25px;
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 50px; display: flex; justify-content: space-between;
            z-index: 100; border: 1px solid rgba(255,255,255,0.4); font-weight: 800;
        }

        #basket {
            position: absolute; bottom: 65px; width: 100px; height: 12px;
            background: var(--gdut-red); border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 50;
        }

        .falling-item { position: absolute; font-size: 42px; pointer-events: none; z-index: 40; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-box { background: rgba(255,255,255,0.6); padding: 12px; border-radius: 15px; }
        .stat-num { font-size: 1.4rem; font-weight: 800; color: var(--gdut-red); display: block; }

        .ground { position: absolute; bottom: 0; width: 100%; height: 60px; background: #4caf50; border-top: 4px solid #388e3c; }
    </style>
</head>
<body>

    <div id="start-screen" class="glass-overlay">
        <div class="card">
            <h1 style="color:var(--gdut-red); margin:0; letter-spacing: 2px;">GDUT</h1>
            <h2 style="margin:5px 0 20px 0;">樱落校园 · 典藏版</h2>
            
            <div class="audio-control">
                <span>🔊 开启音效反馈</span>
                <label class="switch">
                    <input type="checkbox" id="audio-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="btn-group">
                <button class="btn btn-main" onclick="startApp()">开始游戏</button>
                <button class="btn btn-sub" onclick="exitGame()">退出校园</button>
            </div>
        </div>
    </div>

    <div id="end-screen" class="glass-overlay" style="display:none; opacity:0;">
        <div class="card">
            <h2 style="margin-top:0; color:var(--primary);">🎓 载誉归来</h2>
            <div class="stats-grid">
                <div class="stat-box"><small>最终积分</small><span id="final-score" class="stat-num">0</span></div>
                <div class="stat-box"><small>达成等级</small><span id="final-lv" class="stat-num">1</span></div>
                <div class="stat-box"><small>采撷樱花</small><span id="count-cherry" class="stat-num">0</span></div>
                <div class="stat-box"><small>录取通知</small><span id="count-notice" class="stat-num">0</span></div>
            </div>
            <p id="evaluation" style="font-weight:700; color:var(--gdut-red); margin-bottom: 20px;"></p>
            
            <div class="btn-group">
                <button class="btn btn-main" onclick="location.reload()">再来一局</button>
                <button class="btn btn-sub" onclick="exitGame()">退出游戏</button>
            </div>
        </div>
    </div>

    <div id="status-bar">
        <div>SCORE: <span id="score-val">0</span></div>
        <div id="lives-val">❤️❤️❤️</div>
    </div>

    <div id="basket"></div>
    <div class="ground"></div>

    <script>
        let audioCtx, isMuted = false;
        let score = 0, lives = 3, gameActive = false;
        let cCount = 0, nCount = 0; 

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // --- 物理建模音效引擎 ---
        function playHitSound(type) {
            if (isMuted || !audioCtx) return;
            const now = audioCtx.currentTime;
            const click = audioCtx.createOscillator();
            const clickG = audioCtx.createGain();
            click.type = 'square';
            click.frequency.setValueAtTime(2000, now);
            clickG.gain.setValueAtTime(0.08, now);
            clickG.gain.exponentialRampToValueAtTime(0.001, now + 0.01);
            click.connect(clickG); clickG.connect(audioCtx.destination);
            click.start(); click.stop(now + 0.01);

            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);

            if (type === 'cherry') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1000, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(); osc.stop(now + 0.15);
            } else if (type === 'notice') {
                const sub = audioCtx.createOscillator(); const subG = audioCtx.createGain();
                sub.connect(subG); subG.connect(audioCtx.destination);
                osc.type = 'sine'; sub.type = 'sine';
                osc.frequency.setValueAtTime(1760, now); sub.frequency.setValueAtTime(2217, now);
                g.gain.setValueAtTime(0.1, now); subG.gain.setValueAtTime(0.1, now);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.5); subG.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.start(); sub.start(); osc.stop(now + 0.5); sub.stop(now + 0.5);
            } else if (type === 'miss') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
                g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
        }

        function triggerFeedback() {
            const b = document.getElementById('basket');
            b.style.transform = 'scale(1.3, 0.6)';
            setTimeout(() => b.style.transform = 'scale(1)', 100);
            document.body.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
            setTimeout(() => document.body.style.transform = 'translate(0,0)', 50);
        }

        function exitGame() {
            if (confirm("确定要离开广东工业大学吗？")) {
                window.close();
                // 针对无法直接关闭的浏览器页面的兜底
                setTimeout(() => { window.location.href = "about:blank"; }, 100);
            }
        }

        function startApp() {
            isMuted = !document.getElementById('audio-toggle').checked;
            initAudio();
            const screen = document.getElementById('start-screen');
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                gameActive = true;
                setInterval(spawnItem, 800);
            }, 500);
        }

        function spawnItem() {
            if (!gameActive) return;
            const item = document.createElement('div');
            item.className = 'falling-item';
            const r = Math.random();
            let type = r < 0.15 ? 'notice' : 'cherry';
            item.innerHTML = type === 'notice' ? '✉️' : '🌸';
            if(type === 'notice') item.style.filter = "drop-shadow(0 0 10px gold)";

            item.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            item.style.top = '-60px';
            document.body.appendChild(item);

            let y = -60, speed = 4.5 + (score / 60);
            function step() {
                if (!gameActive) { item.remove(); return; }
                y += speed;
                item.style.top = y + 'px';
                
                const b = document.getElementById('basket').getBoundingClientRect();
                const i = item.getBoundingClientRect();

                if (i.bottom > b.top && i.right > b.left && i.left < b.right && i.top < b.bottom) {
                    if (type === 'notice') { score += 20; nCount++; playHitSound('notice'); }
                    else { score += 1; cCount++; playHitSound('cherry'); }
                    document.getElementById('score-val').innerText = score;
                    triggerFeedback();
                    item.remove(); return;
                }

                if (y > window.innerHeight) {
                    if (type === 'cherry') {
                        lives--;
                        document.getElementById('lives-val').innerText = "❤️".repeat(lives);
                        playHitSound('miss');
                    }
                    item.remove();
                    if (lives <= 0) endGame();
                    return;
                }
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function endGame() {
            gameActive = false;
            const endScreen = document.getElementById('end-screen');
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-lv').innerText = Math.floor(score/50) + 1;
            document.getElementById('count-cherry').innerText = cCount;
            document.getElementById('count-notice').innerText = nCount;
            
            let eval = "广工优秀学子！";
            if(score > 300) eval = "广工传奇校友！";
            else if(score < 50) eval = "常回校园看看吧。";
            document.getElementById('evaluation').innerText = eval;

            endScreen.style.display = 'flex';
            setTimeout(() => endScreen.style.opacity = '1', 50);
        }

        // 交互
        const handleMove = (x) => {
            if(!gameActive) return;
            const basketW = 100;
            let targetX = Math.max(basketW/2, Math.min(window.innerWidth - basketW/2, x));
            document.getElementById('basket').style.left = (targetX - basketW/2) + 'px';
        };

        document.addEventListener('mousemove', (e) => handleMove(e.clientX));
        document.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
        }, {passive: false});

    </script>
</body>
</html>
