<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GDUT 樱落校园 · 至尊典藏版</title>
    <style>
        :root {
            --gdut-red: #cc2a2a;
            --gdut-red-glow: rgba(204, 42, 42, 0.4);
            --gold: #ffcf40;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #2c3e50;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe0e9 50%, #e0f7fa 100%);
            height: 100vh; touch-action: none; user-select: none;
        }

        /* --- 动态背景与层级 --- */
        #game-container { position: relative; width: 100%; height: 100%; overflow: hidden; }

        /* --- UI 通用卡片 --- */
        .glass-overlay {
            position: fixed; inset: 0; z-index: 3000;
            display: flex; justify-content: center; align-items: center;
            background: rgba(44, 62, 80, 0.4); backdrop-filter: blur(15px);
            transition: all 0.4s ease;
        }

        .card {
            background: var(--glass-bg); padding: 35px; border-radius: 32px;
            width: 88%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* --- 顶部状态栏 --- */
        #status-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; padding: 12px 25px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px);
            border-radius: 20px; display: flex; justify-content: space-between;
            z-index: 100; border: 1.5px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .stat-group { display: flex; flex-direction: column; align-items: center; }
        .label { font-size: 0.65rem; color: #888; font-weight: 700; text-transform: uppercase; }
        .val { font-size: 1.3rem; font-weight: 900; color: var(--gdut-red); }

        /* --- 游戏核心元素 --- */
        #basket {
            position: absolute; bottom: 85px; width: 110px; height: 20px;
            background: linear-gradient(to bottom, #f44336, var(--gdut-red));
            border-radius: 12px; z-index: 50;
            box-shadow: 0 8px 20px rgba(211, 47, 47, 0.3);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .falling-item { 
            position: absolute; font-size: 45px; pointer-events: none; z-index: 40; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        #combo-text {
            position: absolute; right: 20px; top: 100px;
            font-size: 2rem; font-weight: 900; color: var(--gold);
            text-shadow: 2px 2px 0 var(--gdut-red);
            opacity: 0; pointer-events: none; transition: 0.2s;
        }

        /* --- 按钮系统 --- */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 18px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-main { background: var(--gdut-red); color: white; box-shadow: 0 5px 15px var(--gdut-red-glow); }
        .btn-main:active { transform: scale(0.95); }
        .btn-sub { background: #fff; color: #666; border: 1.5px solid #eee; }

        .ground { position: absolute; bottom: 0; width: 100%; height: 65px; background: #5a9130; border-top: 5px solid #4a7728; }
        
        /* 动画类 */
        .pop { animation: popAnim 0.3s ease-out; }
        @keyframes popAnim { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <div class="stat-group">
            <span class="label">Best</span>
            <span id="high-score" class="val">0</span>
        </div>
        <div class="stat-group">
            <span class="label">Score</span>
            <span id="score-val" class="val">0</span>
        </div>
        <div class="stat-group">
            <span class="label">Life</span>
            <span id="lives-val" style="color:#ff5252">❤️❤️❤️</span>
        </div>
    </div>

    <div id="combo-text">COMBO X1</div>

    <div id="menu-screen" class="glass-overlay">
        <div class="card">
            <h1 id="menu-title" style="color:var(--gdut-red); margin:0; font-size: 2.2rem;">GDUT 樱落</h1>
            <p id="menu-desc" style="margin:10px 0 20px 0; color:#666;">采撷落樱，书写你的广工传奇</p>
            
            <div id="final-stats" style="display:none; background:rgba(0,0,0,0.03); padding:15px; border-radius:20px; margin-bottom:20px;">
                <div style="display:flex; justify-content:space-around;">
                    <div><small>得分</small><div id="end-score" style="font-size:1.5rem; font-weight:900; color:var(--gdut-red);">0</div></div>
                    <div><small>评价</small><div id="end-eval" style="font-size:1rem; font-weight:900;">及格</div></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-main" onclick="startGame()" id="start-btn">开始游戏</button>
                <button class="btn btn-sub" onclick="exitGame()">退出</button>
            </div>
        </div>
    </div>

    <div id="basket"></div>
    <div class="ground"></div>
</div>

<script>
    let score = 0, lives = 3, combo = 0, highScore = 0;
    let gameActive = false, audioCtx = null;
    let spawnTimer = null;

    // 初始化最高分
    highScore = localStorage.getItem('gdut_high_score') || 0;
    document.getElementById('high-score').innerText = highScore;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(freq, duration, type = 'sine') {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startGame() {
        initAudio();
        // 重置数据
        score = 0; lives = 3; combo = 0;
        document.getElementById('score-val').innerText = '0';
        document.getElementById('lives-val').innerText = '❤️❤️❤️';
        document.getElementById('menu-screen').style.display = 'none';
        gameActive = true;
        
        // 开始生成循环
        if (spawnTimer) clearInterval(spawnTimer);
        loop();
    }

    function loop() {
        if (!gameActive) return;
        spawnItem();
        // 动态难度：分数越高生成越快
        let delay = Math.max(300, 1000 - (score * 2));
        spawnTimer = setTimeout(loop, delay);
    }

    function spawnItem() {
        const item = document.createElement('div');
        item.className = 'falling-item';
        const isNotice = Math.random() < 0.1;
        item.innerHTML = isNotice ? '✉️' : '🌸';
        if(isNotice) item.style.filter = "drop-shadow(0 0 10px gold)";
        
        const startX = Math.random() * (window.innerWidth - 60);
        item.style.left = startX + 'px';
        item.style.top = '-60px';
        document.body.appendChild(item);

        let y = -60;
        let speed = 4 + (score / 100);
        let drift = (Math.random() - 0.5) * 2; // 随机摆动

        function step() {
            if (!gameActive) { item.remove(); return; }
            y += speed;
            let currentX = parseFloat(item.style.left) + drift;
            item.style.top = y + 'px';
            item.style.left = currentX + 'px';

            const b = document.getElementById('basket').getBoundingClientRect();
            const i = item.getBoundingClientRect();

            // 碰撞检测
            if (i.bottom > b.top && i.right > b.left && i.left < b.right && i.top < b.bottom) {
                if (isNotice) {
                    score += 20;
                    playSound(880, 0.4, 'triangle');
                } else {
                    combo++;
                    score += (1 + Math.floor(combo/10));
                    playSound(500 + (combo * 10), 0.1);
                    showCombo();
                }
                updateUI();
                item.remove();
                return;
            }

            // 越界检测
            if (y > window.innerHeight) {
                if (!isNotice) {
                    lives--;
                    combo = 0;
                    document.getElementById('lives-val').innerText = "❤️".repeat(lives);
                    playSound(150, 0.3, 'square');
                    if (lives <= 0) gameOver();
                }
                item.remove();
                return;
            }
            requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    function showCombo() {
        const ct = document.getElementById('combo-text');
        if(combo > 5) {
            ct.innerText = `COMBO X${combo}`;
            ct.style.opacity = '1';
            ct.classList.remove('pop');
            void ct.offsetWidth;
            ct.classList.add('pop');
        }
    }

    function updateUI() {
        const s = document.getElementById('score-val');
        s.innerText = score;
        s.classList.remove('pop');
        void s.offsetWidth;
        s.classList.add('pop');
        
        const b = document.getElementById('basket');
        b.style.transform = 'scale(1.2, 0.8)';
        setTimeout(() => b.style.transform = 'scale(1)', 100);
    }

    function gameOver() {
        gameActive = false;
        clearTimeout(spawnTimer);
        
        // 更新最高分
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('gdut_high_score', highScore);
            document.getElementById('high-score').innerText = highScore;
        }

        // 显示结算界面
        document.getElementById('menu-title').innerText = "学期结束";
        document.getElementById('menu-desc').innerText = score > highScore ? "创纪录了！你是广工的神！" : "再接再厉，广工不养闲人~";
        document.getElementById('start-btn').innerText = "再来一局";
        document.getElementById('final-stats').style.display = 'block';
        document.getElementById('end-score').innerText = score;
        document.getElementById('end-eval').innerText = score > 100 ? "优秀" : "继续努力";
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('combo-text').style.opacity = '0';
    }

    function exitGame() {
        if(confirm("确定要退出吗？")) window.close();
    }

    // 交互逻辑
    const handleMove = (x) => {
        if(!gameActive) return;
        const basketW = 110;
        let targetX = Math.max(basketW/2, Math.min(window.innerWidth - basketW/2, x));
        document.getElementById('basket').style.left = (targetX - basketW/2) + 'px';
    };

    document.addEventListener('mousemove', (e) => handleMove(e.clientX));
    document.addEventListener('touchmove', (e) => {
        handleMove(e.touches[0].clientX);
    }, {passive: false});

</script>
</body>
</html>
