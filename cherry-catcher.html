<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接樱花 2.0 - 像素广工</title>
    <style>
        :root {
            --pink: #ff80ab;
            --heart: #ff5252;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e3f2fd 0%, #fce4ec 100%);
            touch-action: none;
        }

        /* --- 状态栏样式 --- */
        #status-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 100;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; color: #444; }

        #hearts { color: var(--heart); letter-spacing: 2px; }

        /* --- 游戏元素 --- */
        #basket {
            position: absolute;
            bottom: 40px;
            width: 100px;
            height: 50px;
            background: #a1887f;
            border-radius: 10px 10px 40px 40px;
            display: flex;
            justify-content: center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }
        #basket::before { content: '🧺'; font-size: 40px; margin-top: -30px; }

        .cherry {
            position: absolute;
            font-size: 30px;
            user-select: none;
            will-change: transform;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        /* --- 弹窗样式 --- */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .btn {
            background: var(--pink);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); }
        .btn.secondary { background: #90a4ae; }

    </style>
</head>
<body>

    <div id="status-bar">
        <div class="stat-item">
            <span class="stat-label">Score</span>
            <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Level</span>
            <span id="level" class="stat-value">1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Life</span>
            <span id="hearts" class="stat-value">❤️❤️❤️</span>
        </div>
    </div>

    <div id="basket"></div>

    <div id="overlay">
        <div class="modal">
            <h1 id="msg-title">游戏结束</h1>
            <p id="msg-body">你在广工校园里接住了 0 片樱花</p>
            <button class="btn" onclick="startGame()">再来一局</button>
            <br>
            <button class="btn secondary" onclick="location.href='games.html'">返回大厅</button>
        </div>
    </div>

    <script>
        const basket = document.getElementById('basket');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const heartsDisplay = document.getElementById('hearts');
        const overlay = document.getElementById('overlay');
        const msgBody = document.getElementById('msg-body');

        let score = 0;
        let lives = 3;
        let level = 1;
        let gameActive = true;
        let speedMultiplier = 1;
        let spawnRate = 1000;
        let spawnTimer;

        // 核心：控制篮子跟随鼠标/手指
        document.addEventListener('mousemove', (e) => moveBasket(e.clientX));
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            moveBasket(e.touches[0].clientX);
        }, {passive: false});

        function moveBasket(x) {
            if(!gameActive) return;
            let targetX = x - basket.offsetWidth / 2;
            targetX = Math.max(0, Math.min(window.innerWidth - basket.offsetWidth, targetX));
            basket.style.left = targetX + 'px';
        }

        function createCherry() {
            if(!gameActive) return;

            const cherry = document.createElement('div');
            cherry.className = 'cherry';
            cherry.innerHTML = '🌸';
            cherry.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            cherry.style.top = '-50px';
            document.body.appendChild(cherry);

            let top = -50;
            let fallSpeed = (3 + Math.random() * 2) * speedMultiplier;
            let rotation = 0;

            function step() {
                if(!gameActive) {
                    cherry.remove();
                    return;
                }

                top += fallSpeed;
                rotation += 2;
                cherry.style.top = top + 'px';
                cherry.style.transform = `rotate(${rotation}deg)`;

                const bRect = basket.getBoundingClientRect();
                const cRect = cherry.getBoundingClientRect();

                // 碰撞检测
                if (cRect.bottom >= bRect.top && 
                    cRect.right >= bRect.left && 
                    cRect.left <= bRect.right && 
                    cRect.top <= bRect.bottom) {
                    
                    score++;
                    updateGameState();
                    // 接住动效
                    basket.style.transform = 'scale(1.1)';
                    setTimeout(() => basket.style.transform = 'scale(1)', 100);
                    cherry.remove();
                    return;
                }

                // 漏接检测
                if (top > window.innerHeight) {
                    lives--;
                    updateHearts();
                    cherry.remove();
                    if(lives <= 0) endGame();
                    return;
                }

                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function updateGameState() {
            scoreDisplay.innerText = score;
            // 每接住10个升一级，增加速度
            if (score % 10 === 0) {
                level = Math.floor(score / 10) + 1;
                levelDisplay.innerText = level;
                speedMultiplier = 1 + (level - 1) * 0.15;
                // 加快生成频率
                clearInterval(spawnTimer);
                spawnRate = Math.max(300, 1000 - (level * 50));
                spawnTimer = setInterval(createCherry, spawnRate);
            }
        }

        function updateHearts() {
            heartsDisplay.innerText = "❤️".repeat(lives) + "🖤".repeat(3 - lives);
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnTimer);
            msgBody.innerText = `你在广工校园里接住了 ${score} 片樱花！`;
            overlay.style.display = 'flex';
        }

        function startGame() {
            // 重置所有状态
            score = 0;
            lives = 3;
            level = 1;
            speedMultiplier = 1;
            spawnRate = 1000;
            gameActive = true;
            
            scoreDisplay.innerText = "0";
            levelDisplay.innerText = "1";
            updateHearts();
            overlay.style.display = 'none';

            clearInterval(spawnTimer);
            spawnTimer = setInterval(createCherry, spawnRate);
        }

        // 启动
        startGame();

    </script>
</body>
</html>
