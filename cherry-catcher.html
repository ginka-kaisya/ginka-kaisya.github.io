<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接樱花 2.0 - 像素广工</title>
    <style>
        :root {
            --pink: #ff80ab;
            --heart: #ff5252;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e3f2fd 0%, #fce4ec 100%);
            touch-action: none;
        }

        /* --- 状态栏样式 --- */
        #status-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 100;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; color: #444; }

        #hearts { color: var(--heart); letter-spacing: 2px; }

        /* --- 游戏元素 --- */
        #basket {
            position: absolute;
            bottom: 40px;
            width: 100px;
            height: 50px;
            background: #a1887f;
            border-radius: 10px 10px 40px 40px;
            display: flex;
            justify-content: center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }
        #basket::before { content: '🧺'; font-size: 40px; margin-top: -30px; }

        .cherry {
            position: absolute;
            font-size: 30px;
            user-select: none;
            will-change: transform;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        /* --- 弹窗样式 --- */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .btn {
            background: var(--pink);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); }
        .btn.secondary { background: #90a4ae; }

    </style>
</head>
<body>

    <div id="status-bar">
        <div class="stat-item">
            <span class="stat-label">Score</span>
            <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Level</span>
            <span id="level" class="stat-value">1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Life</span>
            <span id="hearts" class="stat-value">❤️❤️❤️</span>
        </div>
    </div>

    <div id="basket"></div>

    <div id="overlay">
        <div class="modal">
            <h1 id="msg-title">游戏结束</h1>
            <p id="msg-body">你在
