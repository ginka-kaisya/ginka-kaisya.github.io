<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏菜单 - 像素广工</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #c8e6c9 100%);
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #37474f;
        }

        .menu-container {
            width: 90%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: #546e7a;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .back-btn:hover { color: #81c784; transform: translateX(-5px); }

        h1 { color: #2e7d32; font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #78909c; margin-bottom: 40px; }

        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: white;
            border-radius: 25px;
            padding: 30px 20px;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: #81c784;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .game-title { font-weight: 700; font-size: 1.2rem; color: #37474f; }
        .game-desc { font-size: 0.85rem; color: #90a4ae; margin-top: 8px; }

        /* 特殊颜色装饰 */
        .card-1:hover .icon { filter: drop-shadow(0 0 8px #ff8a80); }
        .card-2:hover .icon { filter: drop-shadow(0 0 8px #81c784); }
        .card-3:hover .icon { filter: drop-shadow(0 0 8px #4fc3f7); }
    </style>
</head>
<body>

    <div class="menu-container">
        <a href="index.html" class="back-btn">← 返回主页</a>
        
        <h1>游戏菜单</h1>
        <p class="subtitle">在广工的午后，选一个游戏消磨时光吧</p>

        <div class="game-list">
            <a href="cherry-catcher.html" class="game-card card-1">
                <div class="icon">🌸</div>
                <div class="game-title">接樱花</div>
                <div class="game-desc">不要让飘落的樱花着地</div>
            </a>

            <a href="teru-jump.html" class="game-card card-2">
                <div class="icon">☁️</div>
                <div class="game-title">晴天跳跳</div>
                <div class="game-desc">操控晴天娃娃跃上云端</div>
            </a>

            <a href="pixel-match.html" class="game-card card-3">
                <div class="icon">🧩</div>
                <div class="game-title">校园拼图</div>
                <div class="game-desc">还原像素风的图书馆</div>
            </a>
        </div>
    </div>

</body>
</html>
